<?xml version="1.0" encoding="UTF-8"?>
<!--
  Olive Mark — framed variant for app icons (Apple touch, PWA 192/512).
  Indigo rounded-square background + the olive sprig + faint Seed of
  Life halo visible only at larger sizes. Composes the full brand-system
  story (etymology + sacred geometry) into one icon.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"
     width="512" height="512" role="img"
     aria-label="Olivia Arcana">
  <defs>
    <linearGradient id="og-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#f7e39a"/>
      <stop offset="50%"  stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#8a6818"/>
    </linearGradient>
    <radialGradient id="og-bg" cx="50%" cy="42%" r="72%">
      <stop offset="0%"  stop-color="#2a1754"/>
      <stop offset="55%" stop-color="#0f0830"/>
      <stop offset="100%" stop-color="#06031a"/>
    </radialGradient>
    <radialGradient id="og-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="rgba(232,201,106,0.20)"/>
      <stop offset="60%" stop-color="rgba(232,201,106,0.06)"/>
      <stop offset="100%" stop-color="rgba(232,201,106,0)"/>
    </radialGradient>
  </defs>

  <!-- Rounded-square background (iOS-style rounded corners ~22% radius) -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#og-bg)"/>

  <!-- Thin gold hairline inside the rounded square, 12px inset -->
  <rect x="24" y="24" width="464" height="464" rx="94" ry="94"
        fill="none" stroke="url(#og-gold)"
        stroke-width="1.5" stroke-opacity="0.42"/>

  <!-- Central glow behind the sprig -->
  <circle cx="256" cy="260" r="160" fill="url(#og-halo)"/>

  <!-- Seed of Life halo (7 hairline circles, r=48 each, hex-packed).
       Subtle — reads as depth at 512px, vanishes at 32px. -->
  <g fill="none" stroke="url(#og-gold)" stroke-opacity="0.38"
     transform="translate(256 260)">
    <circle r="48" stroke-width="1.2"/>
    <circle cx="0"      cy="-48"    r="48" stroke-width="1"/>
    <circle cx="41.57"  cy="-24"    r="48" stroke-width="1"/>
    <circle cx="41.57"  cy="24"     r="48" stroke-width="1"/>
    <circle cx="0"      cy="48"     r="48" stroke-width="1"/>
    <circle cx="-41.57" cy="24"     r="48" stroke-width="1"/>
    <circle cx="-41.57" cy="-24"    r="48" stroke-width="1"/>
  </g>

  <!-- The Olive sprig (scaled up for 512px) -->
  <g transform="translate(256 260) scale(11)">
    <!-- Stem S-curve -->
    <path d="M 0,12 C 1.6,6 -1.6,0 0,-6 C 1,-10 -0.5,-12 0,-13"
          fill="none" stroke="url(#og-gold)"
          stroke-width="1.3" stroke-linecap="round"/>

    <!-- Three filled leaves -->
    <g fill="url(#og-gold)">
      <path d="M 0.5,7 Q 5.5,3 8.5,5 Q 5.5,8 0.5,7 Z"/>
      <path d="M -0.5,1 Q -7,-3 -9.5,-1.5 Q -7,1.5 -0.5,1 Z"/>
      <path d="M 0.5,-5 Q 5.5,-9 8.5,-7 Q 5.5,-4 0.5,-5 Z"/>
    </g>

    <!-- Olive fruit -->
    <ellipse cx="0" cy="-13.5" rx="1.7" ry="2.2" fill="url(#og-gold)"/>
    <circle cx="-0.5" cy="-14.2" r="0.4" fill="rgba(255,250,220,0.9)"/>
  </g>
</svg>
