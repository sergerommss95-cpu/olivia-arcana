<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Olivia Arcana — Ritual I</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#060810; --s1:#0c0d18; --s2:#131525; --s3:#1c1e30;
    --gold:#C8A84B; --gold-l:#E2C070; --gold-d:#8A6D2A;
    --purple:#6b3fa0; --neb:#9b59b6;
    --ink:#E8E6F0; --body:#B8B0C8; --muted:#8A829A;
    --display:"Cormorant Garamond",serif;
    --text:"DM Sans",system-ui,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;width:100%;overflow:hidden;background:var(--void);color:var(--body);font-family:var(--text)}
  body{-webkit-font-smoothing:antialiased;cursor:crosshair}
  #stage{position:fixed;inset:0;overflow:hidden;isolation:isolate}
  #nebula{position:absolute;inset:-10%;
    background:
      radial-gradient(ellipse 60% 50% at 55% 45%,rgba(155,89,182,.22),transparent 60%),
      radial-gradient(ellipse 50% 45% at 42% 60%,rgba(107,63,160,.28),transparent 62%),
      radial-gradient(ellipse 70% 55% at 50% 50%,rgba(200,168,75,.08),transparent 65%),
      radial-gradient(circle at 50% 50%,rgba(6,8,16,0) 0%,rgba(6,8,16,.5) 55%,var(--void) 82%);
    filter:blur(36px) saturate(115%);opacity:0;transform:scale(.2);
    mix-blend-mode:screen;pointer-events:none}
  #starfield{position:absolute;inset:0;pointer-events:none;opacity:0}
  #three-root{position:absolute;inset:0;pointer-events:none;opacity:0}
  #zodiac-layer{position:absolute;inset:0;pointer-events:none}
  .zg{position:absolute;left:50%;top:50%;translate:-50% -50%;
    font-family:var(--display);font-weight:300;color:var(--gold-l);
    font-size:28px;opacity:0;will-change:transform,opacity;
    text-shadow:0 0 18px rgba(226,192,112,.55),0 0 2px rgba(255,240,200,.9)}
  #gravity-card{position:absolute;left:50%;top:50%;width:128px;height:186px;
    translate:-50% -50%;border:1px solid rgba(200,168,75,.55);
    background:linear-gradient(160deg,rgba(28,30,48,.7),rgba(12,13,24,.9));
    border-radius:6px;opacity:0;display:flex;align-items:center;justify-content:center;
    box-shadow:0 10px 40px rgba(107,63,160,.25),0 0 0 1px rgba(226,192,112,.08) inset;
    pointer-events:none}
  #gravity-card::before{content:"";position:absolute;inset:8px;
    border:1px solid rgba(200,168,75,.3);border-radius:3px}
  #gravity-card::after{content:"✦";color:var(--gold);font-family:var(--display);
    font-size:38px;text-shadow:0 0 12px rgba(200,168,75,.7)}

  #overlay-layer{position:absolute;inset:0;pointer-events:none}
  .line{position:absolute;left:50%;top:50%;translate:-50% -50%;
    font-family:var(--display);font-weight:300;
    font-size:clamp(28px,3.6vw,52px);letter-spacing:.08em;
    color:var(--ink);text-align:center;opacity:0;white-space:nowrap;
    text-shadow:0 0 40px rgba(155,89,182,.25)}
  #enter-word{position:absolute;left:50%;top:50%;translate:-50% -50%;
    font-family:var(--display);font-weight:300;
    font-size:clamp(42px,5vw,72px);letter-spacing:.55em;
    padding-left:.55em;color:var(--ink);opacity:0}

  #orb-wrap{position:absolute;left:50%;top:50%;translate:-50% -50%;
    width:min(48vmin,520px);height:min(48vmin,520px);opacity:0;pointer-events:none}
  #orb-label{position:absolute;left:50%;top:calc(50% + min(28vmin,290px));
    translate:-50% 0;font-family:var(--mono);font-size:11px;letter-spacing:.34em;
    color:var(--gold-l);opacity:0;text-transform:uppercase;white-space:nowrap}
  #speak-input{position:absolute;left:50%;top:calc(50% + min(32vmin,330px));
    translate:-50% 0;width:min(520px,70vw);background:transparent;
    border:none;border-bottom:1px solid rgba(200,168,75,.5);color:var(--ink);
    font-family:var(--display);font-weight:300;font-size:22px;letter-spacing:.06em;
    text-align:center;padding:10px 8px;outline:none;opacity:0;caret-color:var(--gold)}
  #speak-input::placeholder{color:var(--muted);font-style:italic}
  #speak-input:focus{border-bottom-color:var(--gold)}

  #reading-layer{position:absolute;inset:0;pointer-events:none}
  .para{position:absolute;max-width:min(320px,32vw);
    font-family:var(--display);font-weight:300;
    font-size:clamp(16px,1.3vw,20px);line-height:1.5;letter-spacing:.04em;
    color:var(--ink);opacity:0;text-shadow:0 0 24px rgba(107,63,160,.3)}
  .para em{font-style:italic;color:var(--gold-l)}

  #chart-wrap{position:absolute;left:50%;top:50%;translate:-50% -50%;
    width:min(62vmin,640px);height:min(62vmin,640px);transform-origin:center;
    opacity:0;pointer-events:none}
  #chart-wrap svg{width:100%;height:100%;overflow:visible;display:block}
  #chart-vignette{position:absolute;inset:-20%;pointer-events:none;
    background:
      radial-gradient(ellipse at 30% 25%,rgba(226,192,112,.18),transparent 45%),
      radial-gradient(ellipse at 80% 80%,rgba(107,63,160,.28),transparent 55%);
    filter:blur(32px);mix-blend-mode:screen;opacity:0}
  #chart-label{position:absolute;left:50%;top:calc(50% + min(32vmin,330px));
    translate:-50% 0;font-family:var(--display);font-weight:300;
    font-size:12px;letter-spacing:.42em;color:var(--gold-l);
    text-transform:uppercase;opacity:0;white-space:nowrap}

  #door-wrap{position:absolute;left:50%;top:calc(50% + min(40vmin,420px));
    translate:-50% 0;display:flex;flex-direction:column;align-items:center;gap:18px;
    opacity:0;pointer-events:none}
  #door-glyph{font-family:var(--display);font-weight:300;font-size:62px;
    color:var(--gold-l);line-height:1;text-shadow:0 0 22px rgba(226,192,112,.5)}
  #door-caption{font-family:var(--display);font-weight:300;font-style:italic;
    color:var(--body);font-size:18px;letter-spacing:.06em}

  #cta-wrap{position:absolute;left:50%;top:calc(50% + min(48vmin,480px));
    translate:-50% 0;display:flex;flex-direction:column;align-items:center;gap:14px;opacity:0}
  #cta{pointer-events:auto;font-family:var(--display);font-weight:300;
    font-size:20px;letter-spacing:.38em;color:var(--ink);text-transform:uppercase;
    background:transparent;padding:16px 36px;border:1px solid var(--gold);
    cursor:pointer;position:relative;transition:color .6s ease}
  #cta::before{content:"";position:absolute;inset:-2px;
    border:1px solid rgba(200,168,75,.25);pointer-events:none}
  #cta:hover{color:var(--gold-l)}
  #reset-link{pointer-events:auto;font-family:var(--mono);font-size:10px;
    letter-spacing:.28em;color:var(--muted);text-transform:uppercase;
    text-decoration:none;border:none;background:transparent;cursor:pointer}
  #reset-link:hover{color:var(--body)}

  #hud-tl{position:fixed;top:28px;left:32px;font-family:var(--display);
    font-weight:300;font-size:14px;letter-spacing:.44em;color:var(--ink);
    text-transform:uppercase;opacity:0}
  #hud-tl small{display:block;font-family:var(--mono);font-size:9px;
    letter-spacing:.3em;color:var(--muted);margin-top:4px}
  #hud-br{position:fixed;bottom:26px;right:32px;font-family:var(--mono);
    font-size:10px;letter-spacing:.36em;color:var(--muted);
    text-transform:uppercase;opacity:0}
  #progress{position:fixed;top:0;left:0;height:1px;width:0;opacity:0;z-index:50;
    background:linear-gradient(90deg,transparent,var(--gold-d) 20%,var(--gold) 50%,var(--gold-d) 80%,transparent)}

  #rooms{position:fixed;inset:0;display:grid;grid-template-columns:repeat(3,1fr);
    background:rgba(6,8,16,.92);backdrop-filter:blur(18px);
    opacity:0;pointer-events:none;z-index:40}
  .room{position:relative;border-right:1px solid rgba(200,168,75,.12);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:22px;padding:60px 40px;transition:background .8s ease;cursor:not-allowed}
  .room:last-child{border-right:none}
  .room:hover{background:rgba(28,30,48,.35)}
  .sigil{width:160px;height:160px;display:flex;align-items:center;justify-content:center}
  .sigil svg{width:100%;height:100%;overflow:visible}
  .room-name{font-family:var(--display);font-weight:300;font-size:30px;
    letter-spacing:.14em;color:var(--ink);text-transform:uppercase;text-align:center}
  .room-sub{font-family:var(--mono);font-size:10px;letter-spacing:.32em;
    color:var(--muted);text-transform:uppercase}
  .room-price{font-family:var(--display);font-style:italic;font-weight:300;
    color:var(--gold-l);font-size:15px;letter-spacing:.08em}
  .lock{display:flex;align-items:center;gap:10px;font-family:var(--mono);
    font-size:9px;letter-spacing:.34em;color:var(--gold);text-transform:uppercase;
    padding-top:8px;border-top:1px solid rgba(200,168,75,.18)}
  .lock svg{width:12px;height:14px}
  .room .halo{position:absolute;inset:10% 12%;border-radius:50%;
    background:radial-gradient(circle,rgba(200,168,75,.08),transparent 65%);
    opacity:0;transition:opacity .9s ease;pointer-events:none}
  .room:hover .halo{opacity:1}
  #rooms-close{position:absolute;top:24px;right:28px;font-family:var(--mono);
    font-size:10px;letter-spacing:.3em;color:var(--muted);background:transparent;
    border:none;cursor:pointer;text-transform:uppercase}
  #rooms-close:hover{color:var(--ink)}
</style>
</head>
<body>
  <div id="stage">
    <div id="nebula"></div>
    <canvas id="starfield"></canvas>
    <div id="three-root"></div>
    <div id="zodiac-layer"></div>
    <div id="gravity-card"></div>

    <div id="orb-wrap"></div>
    <div id="orb-label">What do you seek?</div>
    <input id="speak-input" autocomplete="off" spellcheck="false" placeholder="speak into the glass..." />

    <div id="reading-layer"></div>

    <div id="chart-wrap"></div>
    <div id="chart-vignette"></div>
    <div id="chart-label">Your Chart</div>

    <div id="door-wrap">
      <div id="door-glyph">⛫</div>
      <div id="door-caption">you may now enter the rooms</div>
    </div>

    <div id="cta-wrap">
      <button id="cta">Enter the Rooms</button>
      <button id="reset-link">remain at the altar</button>
    </div>

    <div id="overlay-layer">
      <div id="enter-word">ENTER</div>
      <div class="line" data-k="l1">the sky has been writing your story</div>
      <div class="line" data-k="l2">since the moment you were born</div>
      <div class="line" data-k="l3">now — it whispers</div>
    </div>
  </div>

  <div id="hud-tl">Olivia Arcana<small>alt · experience</small></div>
  <div id="hud-br">Ritual · I</div>
  <div id="progress"></div>

  <div id="rooms" aria-hidden="true">
    <button id="rooms-close">return to altar</button>
  </div>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

// Load GSAP UMD alongside the module so we can build the timeline once it's ready.
const gsapReady = new Promise(res => {
  const s = document.createElement("script");
  s.src = "https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js";
  s.onload = () => res(window.gsap);
  document.head.appendChild(s);
});

/* ---------- Starfield canvas ---------- */
(() => {
  const c = document.getElementById("starfield"), ctx = c.getContext("2d");
  const stars = Array.from({length:180}, () => ({
    x:Math.random(), y:Math.random(), r:Math.random()*1.2+.15,
    a:Math.random()*.7+.15, t:Math.random()*Math.PI*2,
  }));
  const resize = () => { c.width=innerWidth; c.height=innerHeight; };
  addEventListener("resize", resize); resize();
  (function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    const now = performance.now();
    for(const s of stars){
      const tw = .5 + .5*Math.sin(now*.0008 + s.t*7);
      ctx.globalAlpha = s.a*(.5+.5*tw);
      ctx.fillStyle = "#E8E6F0";
      ctx.beginPath();
      ctx.arc(s.x*c.width, s.y*c.height, s.r, 0, Math.PI*2);
      ctx.fill();
    }
    requestAnimationFrame(draw);
  })();
})();

/* ---------- Zodiac glyphs ---------- */
const ZODIAC = ["♈","♉","♊","♋","♌","♍","♎","♏","♐","♑","♒","♓"];
const zLayer = document.getElementById("zodiac-layer");
const zEls = ZODIAC.map((g,i) => {
  const el = document.createElement("div");
  el.className = "zg"; el.textContent = g; el.dataset.i = i;
  zLayer.appendChild(el); return el;
});
let orbitActive = false, orbitStart = 0;
(function animateOrbit(){
  if(orbitActive){
    const t = (performance.now()-orbitStart)/1000;
    const R = Math.min(innerWidth, innerHeight)*.34;
    zEls.forEach((el,i) => {
      if(el.dataset.dropped) return;
      const a = (i/12)*Math.PI*2 + t*.08;
      el.style.transform = `translate(${Math.cos(a)*R}px, ${Math.sin(a)*R*.62}px)`;
    });
  }
  requestAnimationFrame(animateOrbit);
})();

/* ---------- Gravity card ---------- */
const card = document.getElementById("gravity-card");
const cardState = { x:0, y:0, vx:0, vy:0, active:false, drift:0 };
let mouse = { x:innerWidth/2, y:innerHeight/2 };
addEventListener("mousemove", e => { mouse.x=e.clientX; mouse.y=e.clientY; });
(function animateCard(){
  if(cardState.active){
    cardState.drift += .005;
    const baseX = Math.cos(cardState.drift)*innerWidth*.22;
    const baseY = Math.sin(cardState.drift*1.3)*innerHeight*.14;
    const mx = mouse.x-innerWidth/2, my = mouse.y-innerHeight/2;
    const dx = baseX + mx*.35 - cardState.x;
    const dy = baseY + my*.35 - cardState.y;
    cardState.vx = cardState.vx*.9 + dx*.02;
    cardState.vy = cardState.vy*.9 + dy*.02;
    cardState.x += cardState.vx; cardState.y += cardState.vy;
    card.style.transform =
      `translate(calc(-50% + ${cardState.x}px),calc(-50% + ${cardState.y}px)) rotate(${cardState.vx*.8}deg)`;
  }
  requestAnimationFrame(animateCard);
})();

/* ---------- Three.js Listening Glass ---------- */
let three = null;
function initThree(){
  if(three) return three;
  const mount = document.getElementById("three-root");
  const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(2, devicePixelRatio));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 2.0;
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  mount.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  const cam = new THREE.PerspectiveCamera(38, innerWidth/innerHeight, .1, 100);
  cam.position.set(0,0,4.2);

  scene.add(new THREE.AmbientLight(0xffeedd, 1.2));
  scene.add(new THREE.HemisphereLight(0xffd4a0, 0x4466aa, .8));
  const key = new THREE.DirectionalLight(0xE2C070, 1.4); key.position.set(2,3,3); scene.add(key);
  const rim = new THREE.DirectionalLight(0x9b59b6, 1.1); rim.position.set(-3,-1,2); scene.add(rim);

  const orbMat = new THREE.MeshPhysicalMaterial({
    color:0xE8E6F0, metalness:0, roughness:.05,
    transmission:1, thickness:1.2, ior:1.5,
    clearcoat:1, clearcoatRoughness:.1,
    attenuationColor:new THREE.Color(0xc8b0ff), attenuationDistance:2.8,
  });
  const orb = new THREE.Mesh(new THREE.SphereGeometry(1, 96, 96), orbMat);
  scene.add(orb);

  // Interior particle cloud
  const pcount = 600, positions = new Float32Array(pcount*3);
  for(let i=0;i<pcount;i++){
    const r = Math.pow(Math.random(),.6)*.82;
    const theta = Math.random()*Math.PI*2;
    const phi = Math.acos(2*Math.random()-1);
    positions[i*3]   = r*Math.sin(phi)*Math.cos(theta);
    positions[i*3+1] = r*Math.sin(phi)*Math.sin(theta);
    positions[i*3+2] = r*Math.cos(phi);
  }
  const pgeom = new THREE.BufferGeometry();
  pgeom.setAttribute("position", new THREE.BufferAttribute(positions, 3));
  const pmat = new THREE.PointsMaterial({
    color:0xE2C070, size:.018, transparent:true, opacity:.75,
    blending:THREE.AdditiveBlending, depthWrite:false,
  });
  const pts = new THREE.Points(pgeom, pmat); scene.add(pts);

  const coreMat = new THREE.MeshBasicMaterial({
    color:0x9b59b6, transparent:true, opacity:.18,
    blending:THREE.AdditiveBlending, depthWrite:false,
  });
  const core = new THREE.Mesh(new THREE.SphereGeometry(.55, 32, 32), coreMat);
  scene.add(core);

  const state = { pulse:0, warmth:.5, wobble:1 };
  const cold = new THREE.Color(0x6b3fa0), warm = new THREE.Color(0xE2C070);

  (function tick(){
    const t = performance.now()*.001;
    orb.rotation.y = t*.18;
    orb.rotation.x = Math.sin(t*.23)*.08;
    pts.rotation.y = -t*.32;
    pts.rotation.x = Math.cos(t*.27)*.12;
    const breathe = 1 + Math.sin(t*1.6)*.02 + state.pulse*.12;
    orb.scale.setScalar(breathe*state.wobble);
    core.scale.setScalar(.9 + Math.sin(t*2.4)*.06 + state.pulse*.3);
    state.pulse *= .94;
    pmat.color.copy(cold.clone().lerp(warm, state.warmth));
    coreMat.color.copy(cold.clone().lerp(new THREE.Color(0x9b59b6), .5+state.warmth*.4));
    renderer.render(scene, cam);
    requestAnimationFrame(tick);
  })();

  addEventListener("resize", () => {
    cam.aspect = innerWidth/innerHeight; cam.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });

  three = { renderer, scene, cam, orb, pts, state };
  return three;
}

/* ---------- Natal chart SVG (film-poster composition) ---------- */
function buildChart(){
  const signs = ["♈","♉","♊","♋","♌","♍","♎","♏","♐","♑","♒","♓"];
  const planets = [{g:"☉",a:34},{g:"☽",a:112},{g:"☿",a:58},{g:"♀",a:86},
    {g:"♂",a:198},{g:"♃",a:244},{g:"♄",a:302},{g:"♅",a:152}];
  const size = 620, c = size/2, r = 258;
  const xy = (deg, rr) => {
    const rad = (deg-90)*Math.PI/180;
    return [c + Math.cos(rad)*rr, c + Math.sin(rad)*rr];
  };
  let spokes = "", ticks = "", signEls = "", pEls = "", aspects = "";
  for(let i=0;i<12;i++){
    const [x1,y1] = xy(i*30, r-38), [x2,y2] = xy(i*30, r);
    spokes += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#C8A84B" stroke-width=".6" opacity=".55"/>`;
  }
  for(let i=0;i<72;i++){
    const [x1,y1] = xy(i*5, r-6), [x2,y2] = xy(i*5, r);
    ticks += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#8A6D2A" stroke-width=".4" opacity=".75"/>`;
  }
  signs.forEach((s,i) => {
    const [x,y] = xy(i*30 + 15, r-19);
    signEls += `<text x="${x}" y="${y}" fill="#E2C070" font-family="Cormorant Garamond" font-weight="300" font-size="22" text-anchor="middle" dominant-baseline="middle" opacity=".92">${s}</text>`;
  });
  planets.forEach((p,i) => {
    const rr = r - 70 - (i%3)*14, [x,y] = xy(p.a, rr);
    pEls += `<circle cx="${x}" cy="${y}" r="11" fill="#060810" stroke="#C8A84B" stroke-width=".7"/>`
         +  `<text x="${x}" y="${y+1}" fill="#E8E6F0" font-family="Cormorant Garamond" font-size="16" text-anchor="middle" dominant-baseline="middle">${p.g}</text>`;
    const p2 = planets[(i+2)%planets.length], rr2 = r - 70 - ((i+2)%3)*14;
    const [ax,ay] = xy(p.a, rr), [bx,by] = xy(p2.a, rr2);
    aspects += `<line x1="${ax}" y1="${ay}" x2="${bx}" y2="${by}" stroke="#C8A84B" stroke-width=".35" opacity=".35" stroke-dasharray="2 4"/>`;
  });
  const centerSigil = `<g transform="translate(${c} ${c})" opacity=".9">
    <circle r="48" fill="none" stroke="#C8A84B" stroke-width=".6" opacity=".6"/>
    <circle r="30" fill="none" stroke="#C8A84B" stroke-width=".4" opacity=".4"/>
    <path d="M0,-52 L13,-17 L50,-16 L20,6 L31,42 L0,21 L-31,42 L-20,6 L-50,-16 L-13,-17 Z"
          fill="none" stroke="#E2C070" stroke-width=".7" opacity=".75"/>
    <text y="4" fill="#E2C070" font-family="Cormorant Garamond" font-weight="300" font-size="18" text-anchor="middle" letter-spacing="4">OA</text>
  </g>`;
  document.getElementById("chart-wrap").innerHTML = `
  <svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
    <defs>
      <radialGradient id="rg-parchment" cx="50%" cy="48%" r="60%">
        <stop offset="0%" stop-color="#1c1e30" stop-opacity=".85"/>
        <stop offset="60%" stop-color="#0c0d18" stop-opacity=".92"/>
        <stop offset="100%" stop-color="#060810" stop-opacity="1"/>
      </radialGradient>
      <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence type="fractalNoise" baseFrequency=".9" numOctaves="2" seed="4"/>
        <feColorMatrix values="0 0 0 0 .55 0 0 0 0 .45 0 0 0 0 .25 0 0 0 .08 0"/>
        <feComposite in2="SourceGraphic" operator="in"/>
      </filter>
      <filter id="goldglow"><feGaussianBlur stdDeviation="2.6"/>
        <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <rect width="${size}" height="${size}" fill="url(#rg-parchment)"/>
    <rect width="${size}" height="${size}" fill="url(#rg-parchment)" filter="url(#grain)" opacity=".55"/>
    <ellipse cx="${c*.58}" cy="${c*.52}" rx="${c*1.1}" ry="${c*.75}" fill="#9b59b6" opacity=".10"/>
    <ellipse cx="${c*1.45}" cy="${c*1.4}" rx="${c*.8}"  ry="${c*.5}"  fill="#C8A84B" opacity=".06"/>
    <g filter="url(#goldglow)" opacity=".92">
      <circle cx="${c}" cy="${c}" r="${r}"    fill="none" stroke="#C8A84B" stroke-width=".9"/>
      <circle cx="${c}" cy="${c}" r="${r-20}" fill="none" stroke="#8A6D2A" stroke-width=".6"/>
      <circle cx="${c}" cy="${c}" r="${r-38}" fill="none" stroke="#C8A84B" stroke-width=".5"/>
      <circle cx="${c}" cy="${c}" r="${r-110}" fill="none" stroke="#8A6D2A" stroke-width=".35" stroke-dasharray="1 3"/>
    </g>
    ${ticks}${spokes}${signEls}${aspects}${pEls}${centerSigil}
    <g stroke="#C8A84B" stroke-width=".6" opacity=".85" fill="none">
      <path d="M22 22 L22 62 M22 22 L62 22"/>
      <path d="M${size-22} 22 L${size-22} 62 M${size-22} 22 L${size-62} 22"/>
      <path d="M22 ${size-22} L22 ${size-62} M22 ${size-22} L62 ${size-22}"/>
      <path d="M${size-22} ${size-22} L${size-22} ${size-62} M${size-22} ${size-22} L${size-62} ${size-22}"/>
    </g>
    <text x="${c}" y="32" fill="#E2C070" font-family="IBM Plex Mono" font-size="8" letter-spacing="4" text-anchor="middle">OLIVIA ARCANA · NATAL</text>
    <text x="${c}" y="${size-22}" fill="#8A6D2A" font-family="IBM Plex Mono" font-size="7" letter-spacing="5" text-anchor="middle">RITUAL · I</text>
  </svg>`;
}

/* ---------- Reading copy ---------- */
const READING = [
  { text:`The thread you have been following was never yours alone. What arrives at dusk is a <em>returning</em>, not a beginning.`, x:"12%", y:"22%" },
  { text:`Saturn has been teaching you to say the word no as if it were a <em>prayer</em>. The lesson is nearly finished.`, x:"70%", y:"28%" },
  { text:`There is a door in your chest that has been waiting to be knocked upon. Tonight the knocker <em>lifts its hand</em>.`, x:"8%",  y:"66%" },
  { text:`The moon in your twelfth house remembers an old gentleness. Let it find you before you insist on <em>being found</em>.`, x:"68%", y:"68%" },
  { text:`Venus turns her face toward the thing you stopped asking for. Ask once more. Quietly. <em>As if it were already yours</em>.`, x:"42%", y:"14%" },
  { text:`What you call hesitation is a <em>threshold</em>. Cross it slowly. The sky is keeping vigil.`, x:"36%", y:"80%" },
];
function mountReading(){
  const layer = document.getElementById("reading-layer");
  READING.forEach((p,i) => {
    const el = document.createElement("div");
    el.className = "para"; el.dataset.i = i; el.innerHTML = p.text;
    el.style.left = p.x; el.style.top = p.y;
    layer.appendChild(el);
  });
}

/* ---------- Paid rooms ---------- */
const ROOMS = [
  { name:"The Moon Rite", sub:"water · silver", price:"from 44",
    glyph:`<path d="M60 10 A50 50 0 1 0 60 110 A38 38 0 1 1 60 10" fill="none" stroke="#C8A84B" stroke-width="1.2"/>
<circle cx="60" cy="60" r="58" fill="none" stroke="#C8A84B" stroke-width=".4" opacity=".4"/>
<circle cx="86" cy="40" r="2" fill="#E2C070"/><circle cx="78" cy="78" r="1.4" fill="#E2C070"/>` },
  { name:"The Saturn Vigil", sub:"lead · obsidian", price:"from 66",
    glyph:`<path d="M30 26 L90 26 M60 26 L60 100 M50 100 Q60 114 70 100" fill="none" stroke="#C8A84B" stroke-width="1.2" stroke-linecap="round"/>
<circle cx="60" cy="60" r="58" fill="none" stroke="#C8A84B" stroke-width=".4" opacity=".4"/>
<path d="M60 26 L60 20" stroke="#E2C070" stroke-width="1"/>` },
  { name:"The Venus Anointing", sub:"copper · attar", price:"from 55",
    glyph:`<circle cx="60" cy="46" r="22" fill="none" stroke="#C8A84B" stroke-width="1.2"/>
<path d="M60 68 L60 102 M46 88 L74 88" stroke="#C8A84B" stroke-width="1.2" stroke-linecap="round"/>
<circle cx="60" cy="60" r="58" fill="none" stroke="#C8A84B" stroke-width=".4" opacity=".4"/>

function mountRooms(){
  const rooms = document.getElementById("rooms");
  const close = document.getElementById("rooms-close");
  ROOMS.forEach(r => {
    const el = document.createElement("div");
    el.className = "room";
    el.innerHTML = `
      <div class="halo"></div>
      <div class="sigil"><svg viewBox="0 0 120 120">${r.glyph}</svg></div>
      <div class="room-sub">${r.sub}</div>
      <div class="room-name">${r.name}</div>
      <div class="room-price">${r.price}</div>
      <div class="lock">
        <svg viewBox="0 0 12 14" fill="none">
          <rect x="1" y="6" width="10" height="7" stroke="#C8A84B" stroke-width=".9"/>
          <path d="M3 6 V4 A3 3 0 0 1 9 4 V6" stroke="#C8A84B" stroke-width=".9"/>

buildChart(); mountReading(); mountRooms();

/* ---------- Timeline ---------- */
let masterTL = null;

gsapReady.then(gsap => buildTimeline(gsap));

// Dev skip (spacebar) — harmless to leave in.
addEventListener("keydown", e => {
  if(e.code === "Space" && masterTL){
    e.preventDefault();
    masterTL.seek(masterTL.duration() - 0.1);
  }
});

function scatterPositions(){
  const R = Math.min(innerWidth, innerHeight)*.34;
  return zEls.map((_,i) => {
    const a = (i/12)*Math.PI*2;
    return { x:Math.cos(a)*R, y:Math.sin(a)*R*.62 };
  });
}

function pulseOrb(mag=1){
  if(!three || !window.gsap) return;
  three.state.pulse = Math.max(three.state.pulse, mag);
  window.gsap.fromTo(three.state, { wobble:1 + .08*mag },
    { wobble:1, duration:1.6, ease:"elastic.out(1, .6)" });
}

function buildTimeline(gsap){
  const tl = gsap.timeline({ defaults: { ease:"power2.out" } });
  masterTL = tl;

  // Progress + HUD
  tl.to("#progress", { opacity:.7, duration:1 }, 0)
    .to("#progress", { width:"100%", duration:88, ease:"none" }, 0)
    .to("#progress", { opacity:0, duration:1 }, 88)
    .to("#hud-tl",   { opacity:.9, duration:2 }, 2.5)
    .to("#hud-br",   { opacity:.7, duration:1.5 }, 4);

  // T+0s — SILENCE (2s)
  tl.fromTo("#enter-word", { opacity:0 }, { opacity:1, duration:.9, ease:"power2.inOut" }, .3)
    .to("#enter-word", { opacity:0, duration:.9, ease:"power2.inOut" }, 1.4);

  // T+2s — PORTAL AWE
  tl.to("#nebula",    { opacity:1, scale:1, duration:6, ease:"power3.out" }, 2)
    .to("#starfield", { opacity:.8, duration:4 }, 2);

  // Zodiac scatter into orbit
  const pos = scatterPositions();
  tl.fromTo(zEls,
    { opacity:0, scale:.2, x:0, y:0 },
    { opacity:.9, scale:1, duration:2.4, ease:"power3.out",
      stagger:{ each:.08, from:"random" },
      x:(i) => pos[i].x, y:(i) => pos[i].y,
      onStart(){ orbitActive = true; orbitStart = performance.now(); } }, 2.3);

  // Gravity card drifts in, then away
  tl.to("#gravity-card", { opacity:1, duration:1.4, onStart(){ cardState.active = true; } }, 3.5);

  // Three portal lines, 3s apart
  ["l1","l2","l3"].forEach((k,i) => {
    const sel = `.line[data-k="${k}"]`;
    tl.fromTo(sel, { opacity:0, y:20 }, { opacity:1, y:0, duration:1.6 }, 3.8 + i*3)
      .to(sel,     { opacity:0, y:-12, duration:1.4, ease:"power2.in" }, 3.8 + i*3 + 2);
  });

  // T+12s — GLASS CONDENSES
  tl.call(() => initThree(), [], 11.5);

  tl.to(zEls, {
    x:0, y:0, scale:.3, opacity:0, duration:2.4, ease:"power3.inOut",
    stagger:{ each:.04, from:"random" },
    onStart(){ zEls.forEach(e => e.dataset.dropped = "1"); },
  }, 12)
    .to("#nebula",       { opacity:.55, duration:2 }, 12)
    .to("#gravity-card", { opacity:0, duration:1.8, onComplete(){ cardState.active = false; } }, 12)
    .to("#three-root",   { opacity:1, duration:2.6 }, 13)
    .fromTo("#orb-wrap", { opacity:0 }, { opacity:1, duration:2.6 }, 13)
    .fromTo("#orb-label", { opacity:0, y:10 }, { opacity:.85, y:0, duration:1.6 }, 15.5)
    .fromTo("#speak-input",
      { opacity:0, y:12 },
      { opacity:1, y:0, duration:1.4,
        onComplete(){ document.getElementById("speak-input").focus(); } }, 16.5);

  // T+18s — SPEAK (up to 15s window)
  let userSpoke = false;
  const inp = document.getElementById("speak-input");
  inp.addEventListener("keydown", e => {
    if(e.key === "Enter" && tl.time() > 17 && tl.time() < 34){
      userSpoke = true;
      pulseOrb(1.8);
      inp.blur();
      gsap.to(inp, { opacity:.35, duration:1.2 });
    }
  });
  tl.call(() => {
    if(!userSpoke){
      inp.value = inp.value || "guidance";
      pulseOrb(1.2);
    }
  }, [], 28);
  tl.to("#speak-input", { opacity:0, duration:1.2 }, 31)
    .to("#orb-label",   { opacity:0, duration:1.2 }, 31);

  // T+33s — READING UNFOLDS
  const warmShifts = [.3, .8, .2, .7, .9, .25];
  READING.forEach((_,i) => {
    const at = 33 + i*5, sel = `.para[data-i="${i}"]`;
    tl.fromTo(sel, { opacity:0, y:10 }, { opacity:.95, y:0, duration:2.4 }, at)
      .call(() => {
        if(three) gsap.to(three.state, { warmth:warmShifts[i], duration:3, ease:"sine.inOut" });
        pulseOrb(.5);
      }, [], at);
  });
  tl.to(".para", { opacity:0, y:-20, duration:2.2, ease:"power2.in" }, 61);

  // T+63s — CHART CRYSTALLIZES (at 8° Dutch angle)
  tl.to("#three-root", { opacity:0, duration:2.2, ease:"power2.in" }, 62.5)
    .to("#orb-wrap",   { opacity:0, duration:2.2, ease:"power2.in" }, 62.5)
    .fromTo("#chart-wrap",
      { opacity:0, scale:.86, rotate:8 },
      { opacity:1, scale:1, rotate:8, duration:3.4, ease:"power3.out" }, 63)
    .fromTo("#chart-vignette", { opacity:0 }, { opacity:.8, duration:3 }, 63)
    .fromTo("#chart-label", { opacity:0, y:10 }, { opacity:.85, y:0, duration:2 }, 66)
    .to("#chart-wrap", { scale:1.01, duration:6, ease:"sine.inOut", repeat:1, yoyo:true }, 67);

  // T+73s — DEEPER (door glyph)
  tl.fromTo("#door-wrap",
    { opacity:0, y:14 },
    { opacity:1, y:0, duration:3 }, 73);

  // T+83s — CTA WAIT
  tl.fromTo("#cta-wrap",
    { opacity:0, y:20 },
    { opacity:1, y:0, duration:2.8 }, 83)
    .to("#cta", { boxShadow:"0 0 36px rgba(200,168,75,.35)",
      duration:1.8, repeat:-1, yoyo:true, ease:"sine.inOut" }, 84);

  document.getElementById("reset-link").addEventListener("click", () => tl.seek(2));
  document.getElementById("cta").addEventListener("click", openRooms);
}

function openRooms(){
  const gsap = window.gsap, rooms = document.getElementById("rooms");
  rooms.style.pointerEvents = "auto";
  gsap.fromTo(rooms, { opacity:0 }, { opacity:1, duration:1.2 });
  gsap.fromTo(rooms.querySelectorAll(".room"),
    { opacity:0, y:40 }, { opacity:1, y:0, duration:1.6, stagger:.22, ease:"power3.out" });
  gsap.fromTo(rooms.querySelectorAll(".sigil svg path, .sigil svg circle"),
    { opacity:0 }, { opacity:.9, duration:1.4, stagger:.04, delay:.4 });
}
document.getElementById("rooms-close").addEventListener("click", () => {
  window.gsap.to("#rooms", { opacity:0, duration:.9,
    onComplete(){ document.getElementById("rooms").style.pointerEvents = "none"; } });
});
</script>
