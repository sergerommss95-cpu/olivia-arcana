<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Taurus zodiac glyph — Ritual Summon (animated)</title>
  <desc id="desc">Animated Taurus zodiac glyph: a choreographed ritual summon where the aura blooms, cardinal stars cascade, the bull glyph traces itself in gold, the constellation ignites, and the Latin inscription resolves — then settles into an eternal ambient breath.</desc>

  <defs>
    <!-- 1. Deep night radial backdrop -->
    <radialGradient id="bgNight" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a0f2e"/>
      <stop offset="55%" stop-color="#0d0719"/>
      <stop offset="100%" stop-color="#05020e"/>
    </radialGradient>

    <!-- 2. Parchment vignette (darkens toward the edges for the manuscript feel) -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>

    <!-- 3. Subtle parchment warmth — a thin amber wash over the center -->
    <radialGradient id="parchmentWash" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#5a1f33" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#331953" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#331953" stop-opacity="0"/>
    </radialGradient>

    <!-- 4. Gold primary gradient (used for glyph + linework) -->
    <linearGradient id="goldPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe8a3"/>
      <stop offset="45%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#6b4a1f"/>
    </linearGradient>

    <!-- 5. Gold primary, vertical orientation (for the horns) -->
    <linearGradient id="goldPrimaryV" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fff2c6"/>
      <stop offset="50%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#6b4a1f"/>
    </linearGradient>

    <!-- 6. Gold thin gradient — for fine ring / tick marks -->
    <linearGradient id="goldThin" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6b4a1f"/>
      <stop offset="50%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#6b4a1f"/>
    </linearGradient>

    <!-- 7. Aura behind the central glyph -->
    <radialGradient id="centralAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff2c6" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#d4a574" stop-opacity="0.18"/>
      <stop offset="75%" stop-color="#6b4a1f" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#331953" stop-opacity="0"/>
    </radialGradient>

    <!-- 8. Aldebaran star glow -->
    <radialGradient id="aldebaranGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff2c6" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ffe8a3" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#d4a574" stop-opacity="0"/>
    </radialGradient>

    <!-- Path for the Latin inscription along the bottom arc of the outer ring -->
    <path id="inscriptionArc" d="M 76 256 A 180 180 0 0 0 436 256" fill="none"/>

    <!-- Summoning shimmer glow filter -->
    <filter id="summonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ============ BACKGROUND ============ -->
  <g id="background" opacity="0">
    <rect x="0" y="0" width="512" height="512" fill="url(#bgNight)"/>
    <rect x="0" y="0" width="512" height="512" fill="url(#parchmentWash)"/>
    <rect x="0" y="0" width="512" height="512" fill="url(#vignette)"/>
    <animate attributeName="opacity" from="0" to="1" begin="0s" dur="0.3s" fill="freeze"/>
  </g>

  <!-- ============ SACRED GEOMETRY ============ -->
  <g id="sacred-geometry" fill="none" stroke="url(#goldThin)" stroke-opacity="0.85" opacity="0">
    <!-- Ornamental ring fade-in (cascades over the entire sacred geometry layer) -->
    <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.6s" fill="freeze"/>

    <!-- Three concentric circles -->
    <circle cx="256" cy="256" r="240" stroke-width="0.8"/>
    <circle cx="256" cy="256" r="220" stroke-width="0.6" stroke-opacity="0.55"/>
    <circle cx="256" cy="256" r="200" stroke-width="0.8"/>

    <!-- Inner reference circle (reads as a subtle mandala layer) -->
    <circle cx="256" cy="256" r="150" stroke-width="0.4" stroke-opacity="0.35" stroke-dasharray="2 4"/>

    <!-- Rotating outer ring subgroup — ambient slow rotation after summon -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 256 256" to="360 256 256" begin="3s" dur="60s" repeatCount="indefinite"/>

      <!-- 12 tick marks at each 30° around the outer ring (r=240 outward to r=248) -->
      <g stroke="#d4a574" stroke-width="1.2" stroke-opacity="0.85">
        <line x1="256" y1="16"  x2="256" y2="8"/>
        <line x1="376" y1="48"  x2="380" y2="40"/>
        <line x1="464" y1="136" x2="472" y2="132"/>
        <line x1="496" y1="256" x2="504" y2="256"/>
        <line x1="464" y1="376" x2="472" y2="380"/>
        <line x1="376" y1="464" x2="380" y2="472"/>
        <line x1="256" y1="496" x2="256" y2="504"/>
        <line x1="136" y1="464" x2="132" y2="472"/>
        <line x1="48"  y1="376" x2="40"  y2="380"/>
        <line x1="16"  y1="256" x2="8"   y2="256"/>
        <line x1="48"  y1="136" x2="40"  y2="132"/>
        <line x1="136" y1="48"  x2="132" y2="40"/>
      </g>

      <!-- 12 tick marks on the inner ring (r=200 inward to r=192) -->
      <g stroke="#d4a574" stroke-width="1" stroke-opacity="0.7">
        <line x1="256" y1="56"  x2="256" y2="64"/>
        <line x1="356" y1="83"  x2="354" y2="90"/>
        <line x1="429" y1="156" x2="422" y2="158"/>
        <line x1="456" y1="256" x2="448" y2="256"/>
        <line x1="429" y1="356" x2="422" y2="354"/>
        <line x1="356" y1="429" x2="354" y2="422"/>
        <line x1="256" y1="456" x2="256" y2="448"/>
        <line x1="156" y1="429" x2="158" y2="422"/>
        <line x1="83"  y1="356" x2="90"  y2="354"/>
        <line x1="56"  y1="256" x2="64"  y2="256"/>
        <line x1="83"  y1="156" x2="90"  y2="158"/>
        <line x1="156" y1="83"  x2="158" y2="90"/>
      </g>
    </g>

    <!-- Four cardinal jewels — cascade in one by one -->
    <g fill="#d4a574" fill-opacity="0.75">
      <!-- Star 1 (top) -->
      <circle cx="256" cy="36" r="2.2" opacity="0">
        <animate attributeName="opacity" from="0" to="0.75" begin="1.0s" dur="0.25s" fill="freeze"/>
        <animate attributeName="opacity" values="0.4;1;0.4" begin="3.2s" dur="4s" repeatCount="indefinite"/>
      </circle>
      <!-- Star 2 (right) -->
      <circle cx="476" cy="256" r="2.2" opacity="0">
        <animate attributeName="opacity" from="0" to="0.75" begin="1.15s" dur="0.25s" fill="freeze"/>
        <animate attributeName="opacity" values="0.4;1;0.4" begin="3.6s" dur="3.5s" repeatCount="indefinite"/>
      </circle>
      <!-- Star 3 (bottom) -->
      <circle cx="256" cy="476" r="2.2" opacity="0">
        <animate attributeName="opacity" from="0" to="0.75" begin="1.3s" dur="0.25s" fill="freeze"/>
        <animate attributeName="opacity" values="0.4;1;0.4" begin="4.0s" dur="5s" repeatCount="indefinite"/>
      </circle>
      <!-- Star 4 (left) -->
      <circle cx="36"  cy="256" r="2.2" opacity="0">
        <animate attributeName="opacity" from="0" to="0.75" begin="1.45s" dur="0.25s" fill="freeze"/>
        <animate attributeName="opacity" values="0.4;1;0.4" begin="4.4s" dur="4.5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Latin-looking inscription on the outer ring, bottom arc -->
    <g font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#d4a574" letter-spacing="2" font-style="italic" opacity="0" filter="url(#summonGlow)">
      <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.3s" fill="freeze"/>
      <text>
        <textPath href="#inscriptionArc" startOffset="50%" text-anchor="middle">♉  TAVRVS  ·  TERRA  ·  FIXA  ·  VENVS  ·  ALDEBARAN</textPath>
      </text>
    </g>
  </g>

  <!-- ============ AURA BEHIND THE GLYPH ============ -->
  <g id="aura" opacity="0" transform="translate(256 256) scale(0) translate(-256 -256)">
    <!-- Summon: scale from 0 to 1 -->
    <animateTransform attributeName="transform" type="scale" from="0" to="1" begin="0.2s" dur="1s" fill="freeze" additive="sum"/>
    <!-- Summon: opacity 0 -> 0.55 -->
    <animate attributeName="opacity" from="0" to="0.55" begin="0.2s" dur="1s" fill="freeze"/>
    <!-- Ambient breath (returns to 0.55 so no jump) -->
    <animate attributeName="opacity" values="0.55;0.35;0.55" begin="3s" dur="8s" repeatCount="indefinite"/>
    <circle cx="256" cy="256" r="180" fill="url(#centralAura)"/>
  </g>

  <!-- ============ MAIN TAURUS GLYPH ============ -->
  <g id="glyph" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Subtle scale pulse on the entire glyph during ambient phase -->
    <animateTransform attributeName="transform" type="scale" values="1;1.02;1" begin="3s" dur="5s" repeatCount="indefinite" additive="sum"/>

    <!-- Bull's head — circle — main gradient pass (draw-in) -->
    <circle cx="256" cy="286" r="55"
            stroke="url(#goldPrimary)" stroke-width="8"
            pathLength="1000" stroke-dasharray="1000" stroke-dashoffset="1000">
      <animate attributeName="stroke-dashoffset" from="1000" to="0" begin="1.5s" dur="1.2s" fill="freeze"/>
    </circle>
    <!-- Bull's head — inner cream highlight pass for dimension (fades in after draw) -->
    <circle cx="256" cy="286" r="55" stroke="#fff2c6" stroke-width="2.4" stroke-opacity="0" >
      <animate attributeName="stroke-opacity" from="0" to="0.3" begin="2.4s" dur="0.4s" fill="freeze"/>
    </circle>

    <!-- LEFT HORN — cubic bezier sweeping up and outward (draw-in) -->
    <path d="M 206 236 C 180 210, 150 190, 130 150"
          stroke="url(#goldPrimaryV)" stroke-width="10"
          pathLength="800" stroke-dasharray="800" stroke-dashoffset="800">
      <animate attributeName="stroke-dashoffset" from="800" to="0" begin="1.8s" dur="1.0s" fill="freeze"/>
    </path>
    <path d="M 130 150 C 122 138, 118 128, 118 118"
          stroke="url(#goldPrimaryV)" stroke-width="7"
          pathLength="500" stroke-dasharray="500" stroke-dashoffset="500">
      <animate attributeName="stroke-dashoffset" from="500" to="0" begin="2.4s" dur="0.5s" fill="freeze"/>
    </path>
    <!-- Inner cream highlight (fades in after horn draws) -->
    <path d="M 208 238 C 182 212, 152 192, 132 152"
          stroke="#fff2c6" stroke-width="2.6" stroke-opacity="0">
      <animate attributeName="stroke-opacity" from="0" to="0.3" begin="2.8s" dur="0.4s" fill="freeze"/>
    </path>

    <!-- Left horn ornamental tip (small curl) -->
    <circle cx="118" cy="116" r="5" stroke="url(#goldPrimary)" stroke-width="3" fill="#1a0f2e" opacity="0" filter="url(#summonGlow)">
      <animate attributeName="opacity" from="0" to="1" begin="2.9s" dur="0.25s" fill="freeze"/>
    </circle>
    <circle cx="118" cy="116" r="1.6" fill="#fff2c6" fill-opacity="0.85" opacity="0" filter="url(#summonGlow)">
      <animate attributeName="opacity" from="0" to="1" begin="2.95s" dur="0.2s" fill="freeze"/>
      <!-- Ambient horn-tip radius pulse -->
      <animate attributeName="r" values="1.3;1.7;1.3" begin="3s" dur="4s" repeatCount="indefinite"/>
    </circle>

    <!-- RIGHT HORN — mirror of the left (draw-in) -->
    <path d="M 306 236 C 332 210, 362 190, 382 150"
          stroke="url(#goldPrimaryV)" stroke-width="10"
          pathLength="800" stroke-dasharray="800" stroke-dashoffset="800">
      <animate attributeName="stroke-dashoffset" from="800" to="0" begin="1.8s" dur="1.0s" fill="freeze"/>
    </path>
    <path d="M 382 150 C 390 138, 394 128, 394 118"
          stroke="url(#goldPrimaryV)" stroke-width="7"
          pathLength="500" stroke-dasharray="500" stroke-dashoffset="500">
      <animate attributeName="stroke-dashoffset" from="500" to="0" begin="2.4s" dur="0.5s" fill="freeze"/>
    </path>
    <path d="M 304 238 C 330 212, 360 192, 380 152"
          stroke="#fff2c6" stroke-width="2.6" stroke-opacity="0">
      <animate attributeName="stroke-opacity" from="0" to="0.3" begin="2.8s" dur="0.4s" fill="freeze"/>
    </path>

    <!-- Right horn ornamental tip -->
    <circle cx="394" cy="116" r="5" stroke="url(#goldPrimary)" stroke-width="3" fill="#1a0f2e" opacity="0" filter="url(#summonGlow)">
      <animate attributeName="opacity" from="0" to="1" begin="2.9s" dur="0.25s" fill="freeze"/>
    </circle>
    <circle cx="394" cy="116" r="1.6" fill="#fff2c6" fill-opacity="0.85" opacity="0" filter="url(#summonGlow)">
      <animate attributeName="opacity" from="0" to="1" begin="2.95s" dur="0.2s" fill="freeze"/>
      <!-- Ambient horn-tip radius pulse -->
      <animate attributeName="r" values="1.3;1.7;1.3" begin="3s" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ============ CONSTELLATION OVERLAY (Taurus — Hyades V + Aldebaran + horn tips) ============ -->
  <g id="constellation">
    <!-- Connecting lines — drawn via stroke-dashoffset -->
    <g stroke="url(#goldPrimary)" stroke-width="0.6" stroke-opacity="0.4" fill="none" stroke-linecap="round">
      <!-- V-cluster forming the bull's face -->
      <line x1="218" y1="268" x2="240" y2="286" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100">
        <animate attributeName="stroke-dashoffset" from="100" to="0" begin="2.3s" dur="0.6s" fill="freeze"/>
      </line>
      <line x1="240" y1="286" x2="262" y2="300" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100">
        <animate attributeName="stroke-dashoffset" from="100" to="0" begin="2.3s" dur="0.6s" fill="freeze"/>
      </line>
      <line x1="262" y1="300" x2="284" y2="282" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100">
        <animate attributeName="stroke-dashoffset" from="100" to="0" begin="2.3s" dur="0.6s" fill="freeze"/>
      </line>
      <line x1="284" y1="282" x2="300" y2="264" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100">
        <animate attributeName="stroke-dashoffset" from="100" to="0" begin="2.3s" dur="0.6s" fill="freeze"/>
      </line>
      <!-- Horn-tip stars connected to the face cluster -->
      <line x1="218" y1="268" x2="150" y2="170" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100">
        <animate attributeName="stroke-dashoffset" from="100" to="0" begin="2.3s" dur="0.6s" fill="freeze"/>
      </line>
      <line x1="300" y1="264" x2="362" y2="170" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100">
        <animate attributeName="stroke-dashoffset" from="100" to="0" begin="2.3s" dur="0.6s" fill="freeze"/>
      </line>
      <!-- A faint extension toward the brow -->
      <line x1="240" y1="286" x2="256" y2="270" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100">
        <animate attributeName="stroke-dashoffset" from="100" to="0" begin="2.3s" dur="0.6s" fill="freeze"/>
      </line>
    </g>

    <!-- Stars (sized by magnitude) — cascade opacity with stagger of 0.08s starting at 2.6s -->
    <!-- Aldebaran (α Tauri) — brightest -->
    <circle cx="262" cy="300" r="6" fill="url(#aldebaranGlow)" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.3s" fill="freeze"/>
      <animate attributeName="opacity" values="0.4;1;0.4" begin="3.1s" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="262" cy="300" r="3" fill="#fff2c6" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.3s" fill="freeze"/>
      <animate attributeName="opacity" values="0.4;1;0.4" begin="3.1s" dur="4s" repeatCount="indefinite"/>
    </circle>

    <!-- Secondary stars of the Hyades V (staggered 0.08s each) -->
    <circle cx="218" cy="268" r="2.2" fill="#fff2c6" fill-opacity="0.95" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.68s" dur="0.3s" fill="freeze"/>
      <animate attributeName="opacity" values="0.4;1;0.4" begin="3.4s" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="240" cy="286" r="1.6" fill="#ffe8a3" fill-opacity="0.9" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.76s" dur="0.3s" fill="freeze"/>
      <animate attributeName="opacity" values="0.4;1;0.4" begin="3.7s" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="284" cy="282" r="1.8" fill="#ffe8a3" fill-opacity="0.9" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.84s" dur="0.3s" fill="freeze"/>
      <animate attributeName="opacity" values="0.4;1;0.4" begin="4.0s" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="264" r="2"   fill="#fff2c6" fill-opacity="0.95" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.92s" dur="0.3s" fill="freeze"/>
      <animate attributeName="opacity" values="0.4;1;0.4" begin="4.3s" dur="4.6s" repeatCount="indefinite"/>
    </circle>

    <!-- Horn-tip stars (Elnath β Tauri on the right, ζ Tauri on the left) -->
    <circle cx="362" cy="170" r="2.4" fill="#fff2c6" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.3s" fill="freeze"/>
      <animate attributeName="opacity" values="0.4;1;0.4" begin="3.3s" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="170" r="2"   fill="#ffe8a3" fill-opacity="0.95" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.08s" dur="0.3s" fill="freeze"/>
      <animate attributeName="opacity" values="0.4;1;0.4" begin="4.5s" dur="3.6s" repeatCount="indefinite"/>
    </circle>

    <!-- A small 8th star on the brow for narrative density -->
    <circle cx="256" cy="270" r="1.2" fill="#fff2c6" fill-opacity="0.8" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.16s" dur="0.3s" fill="freeze"/>
      <animate attributeName="opacity" values="0.4;1;0.4" begin="3.9s" dur="4.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ============ ORNAMENT — four Gothic filigree corner flourishes ============ -->
  <g id="ornament" fill="none" stroke="#d4a574" stroke-opacity="0.5" stroke-width="1.2" stroke-linecap="round" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.6s" fill="freeze"/>
    <!-- Top-left -->
    <g transform="translate(40,40)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
    <!-- Top-right -->
    <g transform="translate(442,40)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
    <!-- Bottom-left -->
    <g transform="translate(40,442)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
    <!-- Bottom-right -->
    <g transform="translate(442,442)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
  </g>
</svg>
