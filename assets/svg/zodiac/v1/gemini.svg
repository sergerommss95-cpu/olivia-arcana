<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Gemini zodiac glyph</title>
  <desc id="desc">Twins symbol, Mercury ruled, mutable air sign</desc>

  <defs>
    <!-- 1. Deep night radial backdrop -->
    <radialGradient id="bgNight" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a0f2e"/>
      <stop offset="55%" stop-color="#0d0719"/>
      <stop offset="100%" stop-color="#05020e"/>
    </radialGradient>

    <!-- 2. Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>

    <!-- 3. Parchment wash -->
    <radialGradient id="parchmentWash" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#5a1f33" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#331953" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#331953" stop-opacity="0"/>
    </radialGradient>

    <!-- 4. Gold primary gradient (diagonal) -->
    <linearGradient id="goldPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe8a3"/>
      <stop offset="45%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#6b4a1f"/>
    </linearGradient>

    <!-- 5. Gold vertical gradient (for pillars) -->
    <linearGradient id="goldPrimaryV" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fff2c6"/>
      <stop offset="50%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#6b4a1f"/>
    </linearGradient>

    <!-- 6. Gold horizontal thin gradient -->
    <linearGradient id="goldThin" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6b4a1f"/>
      <stop offset="50%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#6b4a1f"/>
    </linearGradient>

    <!-- 7. Aura behind glyph -->
    <radialGradient id="centralAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff2c6" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#d4a574" stop-opacity="0.18"/>
      <stop offset="75%" stop-color="#6b4a1f" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#331953" stop-opacity="0"/>
    </radialGradient>

    <!-- 8. Castor / Pollux star glow -->
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff2c6" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ffe8a3" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#d4a574" stop-opacity="0"/>
    </radialGradient>

    <!-- Inscription arc path (bottom) -->
    <path id="inscriptionArc" d="M 76 256 A 180 180 0 0 0 436 256" fill="none"/>
  </defs>

  <!-- ============ BACKGROUND ============ -->
  <g id="background">
    <rect x="0" y="0" width="512" height="512" fill="url(#bgNight)"/>
    <rect x="0" y="0" width="512" height="512" fill="url(#parchmentWash)"/>
    <rect x="0" y="0" width="512" height="512" fill="url(#vignette)"/>
  </g>

  <!-- ============ STARFIELD ============ -->
  <g id="starfield" fill="#fff2c6">
    <circle cx="72"  cy="108" r="1.1" fill-opacity="0.85"/>
    <circle cx="128" cy="62"  r="0.9" fill-opacity="0.6"/>
    <circle cx="210" cy="44"  r="1.3" fill-opacity="0.9"/>
    <circle cx="340" cy="72"  r="1"   fill-opacity="0.75"/>
    <circle cx="432" cy="108" r="1.4" fill-opacity="0.95"/>
    <circle cx="470" cy="200" r="0.9" fill-opacity="0.65"/>
    <circle cx="452" cy="330" r="1.2" fill-opacity="0.85"/>
    <circle cx="388" cy="430" r="1"   fill-opacity="0.7"/>
    <circle cx="168" cy="446" r="1.1" fill-opacity="0.8"/>
    <circle cx="68"  cy="380" r="1.3" fill-opacity="0.9"/>
    <circle cx="46"  cy="270" r="0.8" fill-opacity="0.55"/>
    <circle cx="92"  cy="200" r="1"   fill-opacity="0.7"/>
  </g>

  <!-- ============ SACRED GEOMETRY ============ -->
  <g id="sacred-geometry" fill="none" stroke="url(#goldThin)" stroke-opacity="0.85">
    <!-- Three concentric circles -->
    <circle cx="256" cy="256" r="260" stroke-width="0.7" stroke-opacity="0.45"/>
    <circle cx="256" cy="256" r="240" stroke-width="0.9"/>
    <circle cx="256" cy="256" r="200" stroke-width="0.8"/>

    <!-- Inner mandala dashed reference ring -->
    <circle cx="256" cy="256" r="150" stroke-width="0.4" stroke-opacity="0.35" stroke-dasharray="2 4"/>

    <!-- 12 tick marks at each 30° around the outer ring (r=240 outward to r=248) -->
    <g stroke="#d4a574" stroke-width="1.2" stroke-opacity="0.85">
      <line x1="256" y1="16"  x2="256" y2="8"/>
      <line x1="376" y1="48"  x2="380" y2="40"/>
      <line x1="464" y1="136" x2="472" y2="132"/>
      <line x1="496" y1="256" x2="504" y2="256"/>
      <line x1="464" y1="376" x2="472" y2="380"/>
      <line x1="376" y1="464" x2="380" y2="472"/>
      <line x1="256" y1="496" x2="256" y2="504"/>
      <line x1="136" y1="464" x2="132" y2="472"/>
      <line x1="48"  y1="376" x2="40"  y2="380"/>
      <line x1="16"  y1="256" x2="8"   y2="256"/>
      <line x1="48"  y1="136" x2="40"  y2="132"/>
      <line x1="136" y1="48"  x2="132" y2="40"/>
    </g>

    <!-- 12 tick marks on the inner ring (r=200 inward to r=192) -->
    <g stroke="#d4a574" stroke-width="1" stroke-opacity="0.7">
      <line x1="256" y1="56"  x2="256" y2="64"/>
      <line x1="356" y1="83"  x2="354" y2="90"/>
      <line x1="429" y1="156" x2="422" y2="158"/>
      <line x1="456" y1="256" x2="448" y2="256"/>
      <line x1="429" y1="356" x2="422" y2="354"/>
      <line x1="356" y1="429" x2="354" y2="422"/>
      <line x1="256" y1="456" x2="256" y2="448"/>
      <line x1="156" y1="429" x2="158" y2="422"/>
      <line x1="83"  y1="356" x2="90"  y2="354"/>
      <line x1="56"  y1="256" x2="64"  y2="256"/>
      <line x1="83"  y1="156" x2="90"  y2="158"/>
      <line x1="156" y1="83"  x2="158" y2="90"/>
    </g>

    <!-- Four cardinal-point 4-pointed stars -->
    <g fill="#d4a574" fill-opacity="0.85">
      <path d="M 256 26 L 259 36 L 269 39 L 259 42 L 256 52 L 253 42 L 243 39 L 253 36 Z"/>
      <path d="M 486 256 L 489 259 L 499 256 L 489 253 L 486 246 L 483 253 L 473 256 L 483 259 Z" transform="rotate(45 486 256)"/>
      <path d="M 256 486 L 259 476 L 269 473 L 259 470 L 256 460 L 253 470 L 243 473 L 253 476 Z" transform="rotate(180 256 486)"/>
      <path d="M 26 256 L 36 253 L 39 243 L 42 253 L 52 256 L 42 259 L 39 269 L 36 259 Z"/>
    </g>
  </g>

  <!-- ============ AURA BEHIND THE GLYPH ============ -->
  <g id="aura">
    <circle cx="256" cy="200" r="180" fill="url(#centralAura)"/>
  </g>

  <!-- ============ CONSTELLATION OVERLAY (Gemini — Castor, Pollux, Alhena, etc.) ============ -->
  <g id="constellation" opacity="0.4">
    <!-- Connecting lines — the two brother-figures of Gemini -->
    <g stroke="url(#goldPrimary)" stroke-width="0.7" fill="none" stroke-linecap="round">
      <!-- Castor (upper left head) down through torso to foot -->
      <line x1="200" y1="96"  x2="206" y2="150"/>   <!-- head to shoulder -->
      <line x1="206" y1="150" x2="200" y2="220"/>   <!-- shoulder to waist -->
      <line x1="200" y1="220" x2="192" y2="300"/>   <!-- waist to knee -->
      <line x1="192" y1="300" x2="186" y2="360"/>   <!-- knee to Alhena (foot) -->
      <!-- Pollux (upper right head) down through torso to foot -->
      <line x1="316" y1="104" x2="310" y2="156"/>   <!-- head to shoulder -->
      <line x1="310" y1="156" x2="314" y2="224"/>   <!-- shoulder to waist -->
      <line x1="314" y1="224" x2="322" y2="300"/>   <!-- waist to knee -->
      <line x1="322" y1="300" x2="332" y2="362"/>   <!-- knee to foot -->
      <!-- Shoulder-to-shoulder linking bar -->
      <line x1="206" y1="150" x2="310" y2="156"/>
    </g>
  </g>

  <!-- Constellation stars — rendered over glyph area so they read as sky behind/beside -->
  <g id="constellation-stars">
    <!-- Castor (α Gem) -->
    <circle cx="200" cy="96" r="5.5" fill="url(#starGlow)"/>
    <circle cx="200" cy="96" r="2.4" fill="#fff2c6"/>
    <!-- Pollux (β Gem) — slightly brighter -->
    <circle cx="316" cy="104" r="6"   fill="url(#starGlow)"/>
    <circle cx="316" cy="104" r="2.8" fill="#fff2c6"/>
    <!-- Alhena (γ Gem) — the left foot -->
    <circle cx="186" cy="360" r="3.2" fill="url(#starGlow)"/>
    <circle cx="186" cy="360" r="1.6" fill="#fff2c6"/>
    <!-- Minor stars along torso/knee — low opacity -->
    <circle cx="206" cy="150" r="1.4" fill="#fff2c6" fill-opacity="0.85"/>
    <circle cx="310" cy="156" r="1.4" fill="#fff2c6" fill-opacity="0.85"/>
    <circle cx="200" cy="220" r="1.1" fill="#ffe8a3" fill-opacity="0.7"/>
    <circle cx="314" cy="224" r="1.1" fill="#ffe8a3" fill-opacity="0.7"/>
    <circle cx="192" cy="300" r="1.2" fill="#fff2c6" fill-opacity="0.75"/>
    <circle cx="322" cy="300" r="1.2" fill="#fff2c6" fill-opacity="0.75"/>
    <circle cx="332" cy="362" r="1.5" fill="#fff2c6" fill-opacity="0.8"/>
  </g>

  <!-- ============ MAIN GEMINI GLYPH ============ -->
  <!-- Two vertical pillars with top and bottom arcs (canonical Roman-numeral-II) -->
  <g id="glyph" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- TOP CONNECTING ARC — bridges top of both pillars -->
    <path d="M 220 120 Q 256 98 292 120"
          stroke="url(#goldPrimary)" stroke-width="14"/>
    <!-- Top arc inner cream highlight -->
    <path d="M 220 120 Q 256 98 292 120"
          stroke="#fff2c6" stroke-width="1.5" stroke-opacity="0.55"/>

    <!-- LEFT PILLAR — vertical gradient, height ~160 -->
    <line x1="220" y1="120" x2="220" y2="280"
          stroke="url(#goldPrimaryV)" stroke-width="14"/>
    <!-- Left pillar inner cream highlight -->
    <line x1="220" y1="122" x2="220" y2="278"
          stroke="#fff2c6" stroke-width="1.5" stroke-opacity="0.55"/>

    <!-- RIGHT PILLAR — vertical gradient -->
    <line x1="292" y1="120" x2="292" y2="280"
          stroke="url(#goldPrimaryV)" stroke-width="14"/>
    <!-- Right pillar inner cream highlight -->
    <line x1="292" y1="122" x2="292" y2="278"
          stroke="#fff2c6" stroke-width="1.5" stroke-opacity="0.55"/>

    <!-- BOTTOM CONNECTING ARC — bridges bottom of both pillars -->
    <path d="M 220 280 Q 256 302 292 280"
          stroke="url(#goldPrimary)" stroke-width="14"/>
    <!-- Bottom arc inner cream highlight -->
    <path d="M 220 280 Q 256 302 292 280"
          stroke="#fff2c6" stroke-width="1.5" stroke-opacity="0.55"/>

    <!-- Ornamental sphere caps at the four corners -->
    <circle cx="220" cy="120" r="2.5" fill="#fff2c6" stroke="none"/>
    <circle cx="292" cy="120" r="2.5" fill="#fff2c6" stroke="none"/>
    <circle cx="220" cy="280" r="2.5" fill="#fff2c6" stroke="none"/>
    <circle cx="292" cy="280" r="2.5" fill="#fff2c6" stroke="none"/>

    <!-- Subtle jewel on the top arc apex (Mercury ruler nod) -->
    <circle cx="256" cy="105" r="3.2" stroke="url(#goldPrimary)" stroke-width="1.2" fill="#1a0f2e"/>
    <circle cx="256" cy="105" r="1.2" fill="#fff2c6" fill-opacity="0.9" stroke="none"/>
  </g>

  <!-- ============ INSCRIPTION — Latin at bottom arc ============ -->
  <g id="inscription" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#d4a574" letter-spacing="2" font-style="italic">
    <text>
      <textPath href="#inscriptionArc" startOffset="50%" text-anchor="middle">♊  GEMINI  ·  AER  MUTABILIS  ·  MERCVRIVS  ·  CASTOR  ET  POLLVX</textPath>
    </text>
  </g>

  <!-- ============ ORNAMENT — four Gothic filigree corner flourishes ============ -->
  <g id="ornament" fill="none" stroke="#d4a574" stroke-opacity="0.5" stroke-width="1.2" stroke-linecap="round">
    <!-- Top-left -->
    <g transform="translate(40,40)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
    <!-- Top-right -->
    <g transform="translate(442,40)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
    <!-- Bottom-left -->
    <g transform="translate(40,442)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
    <!-- Bottom-right -->
    <g transform="translate(442,442)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
  </g>
</svg>
