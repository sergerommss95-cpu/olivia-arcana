<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Virgo zodiac glyph</title>
  <desc id="desc">The Maiden — Mercury-ruled mutable earth sign, rendered as a stylized M-with-inward-spiral glyph in gold linework on deep navy, with Spica constellation overlay and Latin inscription</desc>

  <defs>
    <!-- 1. Deep night radial backdrop -->
    <radialGradient id="bgNight" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a0f2e"/>
      <stop offset="55%" stop-color="#0d0719"/>
      <stop offset="100%" stop-color="#05020e"/>
    </radialGradient>

    <!-- 2. Parchment vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>

    <!-- 3. Earth-toned parchment wash — Virgo is earth element, Mercury-ruled; warm scholarly tint -->
    <radialGradient id="earthWash" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#5a3a1f" stop-opacity="0.13"/>
      <stop offset="60%" stop-color="#3a2614" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#3a2614" stop-opacity="0"/>
    </radialGradient>

    <!-- 4. Gold primary gradient (glyph + linework, diagonal) -->
    <linearGradient id="goldPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe8a3"/>
      <stop offset="45%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#6b4a1f"/>
    </linearGradient>

    <!-- 5. Gold vertical gradient (for the M-strokes of the glyph) -->
    <linearGradient id="goldPrimaryV" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fff2c6"/>
      <stop offset="50%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#6b4a1f"/>
    </linearGradient>

    <!-- 6. Gold thin gradient — fine ring / tick marks -->
    <linearGradient id="goldThin" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6b4a1f"/>
      <stop offset="50%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#6b4a1f"/>
    </linearGradient>

    <!-- 7. Aura behind the central glyph -->
    <radialGradient id="centralAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff2c6" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#d4a574" stop-opacity="0.18"/>
      <stop offset="75%" stop-color="#6b4a1f" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#3a2614" stop-opacity="0"/>
    </radialGradient>

    <!-- 8. Spica star glow (alpha Virginis — brightest in Virgo) -->
    <radialGradient id="spicaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff2c6" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ffe8a3" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#d4a574" stop-opacity="0"/>
    </radialGradient>

    <!-- Path for the bottom-arc inscription -->
    <path id="inscriptionArc" d="M 76 256 A 180 180 0 0 0 436 256" fill="none"/>
  </defs>

  <!-- ============ BACKGROUND ============ -->
  <g id="background">
    <rect x="0" y="0" width="512" height="512" fill="url(#bgNight)"/>
    <rect x="0" y="0" width="512" height="512" fill="url(#earthWash)"/>
    <rect x="0" y="0" width="512" height="512" fill="url(#vignette)"/>
  </g>

  <!-- ============ STARFIELD — scattered background stars ============ -->
  <g id="starfield" fill="#fff2c6">
    <circle cx="72"  cy="88"  r="1.1" fill-opacity="0.75"/>
    <circle cx="132" cy="58"  r="0.9" fill-opacity="0.6"/>
    <circle cx="214" cy="102" r="1.3" fill-opacity="0.85"/>
    <circle cx="428" cy="76"  r="1"   fill-opacity="0.7"/>
    <circle cx="466" cy="166" r="1.4" fill-opacity="0.9"/>
    <circle cx="50"  cy="208" r="1.1" fill-opacity="0.75"/>
    <circle cx="94"  cy="396" r="1.2" fill-opacity="0.8"/>
    <circle cx="160" cy="444" r="0.9" fill-opacity="0.6"/>
    <circle cx="404" cy="430" r="1.3" fill-opacity="0.85"/>
    <circle cx="458" cy="378" r="1"   fill-opacity="0.7"/>
    <circle cx="342" cy="62"  r="0.8" fill-opacity="0.55"/>
    <circle cx="74"  cy="332" r="1"   fill-opacity="0.7"/>
  </g>

  <!-- ============ SACRED GEOMETRY ============ -->
  <g id="sacred-geometry" fill="none" stroke="url(#goldThin)" stroke-opacity="0.85">
    <!-- Three concentric circles -->
    <circle cx="256" cy="256" r="240" stroke-width="0.8"/>
    <circle cx="256" cy="256" r="220" stroke-width="0.6" stroke-opacity="0.55"/>
    <circle cx="256" cy="256" r="200" stroke-width="0.8"/>

    <!-- Inner dashed mandala reference ring -->
    <circle cx="256" cy="256" r="150" stroke-width="0.4" stroke-opacity="0.35" stroke-dasharray="2 4"/>

    <!-- 12 tick marks on outer ring (r=240 → r=248), every 30° -->
    <g stroke="#d4a574" stroke-width="1.2" stroke-opacity="0.85">
      <line x1="256" y1="16"  x2="256" y2="8"/>
      <line x1="376" y1="48"  x2="380" y2="40"/>
      <line x1="464" y1="136" x2="472" y2="132"/>
      <line x1="496" y1="256" x2="504" y2="256"/>
      <line x1="464" y1="376" x2="472" y2="380"/>
      <line x1="376" y1="464" x2="380" y2="472"/>
      <line x1="256" y1="496" x2="256" y2="504"/>
      <line x1="136" y1="464" x2="132" y2="472"/>
      <line x1="48"  y1="376" x2="40"  y2="380"/>
      <line x1="16"  y1="256" x2="8"   y2="256"/>
      <line x1="48"  y1="136" x2="40"  y2="132"/>
      <line x1="136" y1="48"  x2="132" y2="40"/>
    </g>

    <!-- 12 tick marks on inner ring (r=200 → r=192) -->
    <g stroke="#d4a574" stroke-width="1" stroke-opacity="0.7">
      <line x1="256" y1="56"  x2="256" y2="64"/>
      <line x1="356" y1="83"  x2="354" y2="90"/>
      <line x1="429" y1="156" x2="422" y2="158"/>
      <line x1="456" y1="256" x2="448" y2="256"/>
      <line x1="429" y1="356" x2="422" y2="354"/>
      <line x1="356" y1="429" x2="354" y2="422"/>
      <line x1="256" y1="456" x2="256" y2="448"/>
      <line x1="156" y1="429" x2="158" y2="422"/>
      <line x1="83"  y1="356" x2="90"  y2="354"/>
      <line x1="56"  y1="256" x2="64"  y2="256"/>
      <line x1="83"  y1="156" x2="90"  y2="158"/>
      <line x1="156" y1="83"  x2="158" y2="90"/>
    </g>

    <!-- Ornamental double-ring frame (tight pair at r=168/r=172 — subtle second frame) -->
    <circle cx="256" cy="256" r="172" stroke="#d4a574" stroke-width="0.5" stroke-opacity="0.45"/>
    <circle cx="256" cy="256" r="168" stroke="#d4a574" stroke-width="0.35" stroke-opacity="0.3"/>

    <!-- 4 cardinal-point 4-pointed stars (compass jewels) -->
    <g fill="#d4a574" fill-opacity="0.85" stroke="none">
      <!-- North -->
      <path d="M 256 22 L 259 36 L 273 39 L 259 42 L 256 56 L 253 42 L 239 39 L 253 36 Z"/>
      <!-- East -->
      <path d="M 490 256 L 476 259 L 473 273 L 470 259 L 456 256 L 470 253 L 473 239 L 476 253 Z"/>
      <!-- South -->
      <path d="M 256 490 L 259 476 L 273 473 L 259 470 L 256 456 L 253 470 L 239 473 L 253 476 Z"/>
      <!-- West -->
      <path d="M 22 256 L 36 259 L 39 273 L 42 259 L 56 256 L 42 253 L 39 239 L 36 253 Z"/>
    </g>

    <!-- Bottom-arc inscription: Virgo · Terra Mutabilis -->
    <g font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#d4a574" letter-spacing="2" font-style="italic">
      <text>
        <textPath href="#inscriptionArc" startOffset="50%" text-anchor="middle">♍  VIRGO  ·  TERRA  MUTABILIS  ·  MERCURIUS  ·  SPICA</textPath>
      </text>
    </g>
  </g>

  <!-- ============ AURA BEHIND THE GLYPH ============ -->
  <g id="aura">
    <circle cx="256" cy="205" r="165" fill="url(#centralAura)"/>
  </g>

  <!-- ============ MAIN VIRGO GLYPH — canonical ♍ : 3 verticals, 2 arches, rightmost curls INWARD into a spiral ============ -->
  <g id="glyph" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left arch: top of stroke 1 (x=190) to top of stroke 2 (x=240) -->
    <path d="M 190 140 Q 215 118 240 140"
          stroke="url(#goldPrimaryV)" stroke-width="14"/>

    <!-- Right arch: top of stroke 2 (x=240) to top of stroke 3 (x=290) -->
    <path d="M 240 140 Q 265 118 290 140"
          stroke="url(#goldPrimaryV)" stroke-width="14"/>

    <!-- Stroke 1 (leftmost vertical) — plain descent to baseline -->
    <path d="M 190 140 L 190 270"
          stroke="url(#goldPrimaryV)" stroke-width="14"/>

    <!-- Stroke 2 (middle vertical) — plain descent to baseline -->
    <path d="M 240 140 L 240 270"
          stroke="url(#goldPrimaryV)" stroke-width="14"/>

    <!-- Stroke 3 (rightmost vertical) — descent to baseline, then INWARD spiral -->
    <path d="M 290 140 L 290 270"
          stroke="url(#goldPrimaryV)" stroke-width="14"/>

    <!-- Inward spiral: past baseline, curls back toward center, tightening into a small eye -->
    <path d="M 290 270 C 300 285, 288 300, 270 296 C 254 293, 252 280, 266 278"
          stroke="url(#goldPrimaryV)" stroke-width="14"/>

    <!-- Inner cream highlight pass — one continuous trace over the whole glyph -->
    <path d="M 190 270 L 190 140 Q 215 118 240 140 L 240 270 M 240 140 Q 265 118 290 140 L 290 270 C 300 285, 288 300, 270 296 C 254 293, 252 280, 266 278"
          stroke="#fff2c6" stroke-width="1.5" stroke-opacity="0.55"/>

    <!-- Ornamental sphere caps at the tops of each of the 3 strokes -->
    <circle cx="190" cy="140" r="2.5" fill="#fff2c6"/>
    <circle cx="240" cy="140" r="2.5" fill="#fff2c6"/>
    <circle cx="290" cy="140" r="2.5" fill="#fff2c6"/>

    <!-- Cream pearl at the center/eye of the inward spiral curl -->
    <circle cx="266" cy="278" r="3" fill="#fff2c6"/>
  </g>

  <!-- ============ CONSTELLATION — Virgo key stars ============ -->
  <g id="constellation" opacity="0.95">
    <!-- Connecting lines (opacity 0.4) — graceful arc of the maiden constellation -->
    <g stroke="url(#goldPrimary)" stroke-width="0.7" stroke-opacity="0.4" fill="none" stroke-linecap="round">
      <!-- Spica (α, bottom-left) up to Heze (ζ) -->
      <line x1="148" y1="380" x2="202" y2="332"/>
      <!-- Heze to Porrima (γ, central) -->
      <line x1="202" y1="332" x2="258" y2="298"/>
      <!-- Porrima to Zavijava (β, upper-right) -->
      <line x1="258" y1="298" x2="346" y2="258"/>
      <!-- Porrima to Auva (δ, upper-left) -->
      <line x1="258" y1="298" x2="196" y2="248"/>
      <!-- Auva to Vindemiatrix (ε, top) -->
      <line x1="196" y1="248" x2="234" y2="172"/>
      <!-- Zavijava to Zaniah (η, right) -->
      <line x1="346" y1="258" x2="388" y2="198"/>
    </g>

    <!-- Stars (sized by magnitude) -->
    <!-- Spica (α Virginis) — brightest, lower-left with halo -->
    <circle cx="148" cy="380" r="9" fill="url(#spicaGlow)"/>
    <circle cx="148" cy="380" r="3" fill="#fff2c6"/>
    <!-- Heze (ζ Virginis) -->
    <circle cx="202" cy="332" r="2.2" fill="#ffe8a3" fill-opacity="0.95"/>
    <!-- Porrima (γ Virginis) — central junction -->
    <circle cx="258" cy="298" r="2.4" fill="#fff2c6"/>
    <!-- Zavijava (β Virginis) -->
    <circle cx="346" cy="258" r="2.2" fill="#ffe8a3" fill-opacity="0.95"/>
    <!-- Auva (δ Virginis) -->
    <circle cx="196" cy="248" r="2" fill="#ffe8a3" fill-opacity="0.9"/>
    <!-- Vindemiatrix (ε Virginis) — the "grape-gatherer" -->
    <circle cx="234" cy="172" r="2.3" fill="#fff2c6"/>
    <!-- Zaniah (η Virginis) -->
    <circle cx="388" cy="198" r="1.9" fill="#ffe8a3" fill-opacity="0.9"/>
  </g>

  <!-- ============ ORNAMENT — four Gothic filigree corner flourishes ============ -->
  <g id="ornament" fill="none" stroke="#d4a574" stroke-opacity="0.5" stroke-width="1.2" stroke-linecap="round">
    <!-- Top-left -->
    <g transform="translate(40,40)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
    <!-- Top-right -->
    <g transform="translate(442,40)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
    <!-- Bottom-left -->
    <g transform="translate(40,442)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
    <!-- Bottom-right -->
    <g transform="translate(442,442)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
  </g>
</svg>
