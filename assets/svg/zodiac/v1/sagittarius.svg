<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Sagittarius zodiac glyph</title>
  <desc id="desc">Archer's arrow symbol, Jupiter ruled, mutable fire sign. Diagonal arrow with barbed tip and cross-bar notch, rendered in Mystic Cartography style: gold linework on deep navy parchment-night with concentric sacred-geometry rings, starfield, the Sagittarius "Teapot" asterism, a Latin inscription, and four Gothic filigree corner flourishes.</desc>

  <defs>
    <!-- 1. Deep night radial backdrop -->
    <radialGradient id="bgNight" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a0f2e"/>
      <stop offset="55%" stop-color="#0d0719"/>
      <stop offset="100%" stop-color="#05020e"/>
    </radialGradient>

    <!-- 2. Parchment vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>

    <!-- 3. Jupiter/fire warm gold wash — Sagittarius is Jupiter-ruled mutable fire -->
    <radialGradient id="jupiterWash" cx="50%" cy="50%" r="48%">
      <stop offset="0%" stop-color="#6b3a14" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#4a2a18" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#331953" stop-opacity="0"/>
    </radialGradient>

    <!-- 4. Gold primary gradient (glyph + linework, diagonal — aligned with the arrow's axis) -->
    <linearGradient id="goldPrimary" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6b4a1f"/>
      <stop offset="45%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#ffe8a3"/>
    </linearGradient>

    <!-- 5. Royal-gold Jupiter accent — warmer and richer than Taurus -->
    <linearGradient id="royalGold" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8a5a1f"/>
      <stop offset="50%" stop-color="#f4d16e"/>
      <stop offset="100%" stop-color="#fff2c6"/>
    </linearGradient>

    <!-- 6. Gold vertical gradient — secondary -->
    <linearGradient id="goldPrimaryV" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fff2c6"/>
      <stop offset="50%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#6b4a1f"/>
    </linearGradient>

    <!-- 7. Gold thin gradient — fine ring / tick marks -->
    <linearGradient id="goldThin" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6b4a1f"/>
      <stop offset="50%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#6b4a1f"/>
    </linearGradient>

    <!-- 8. Aura behind the central glyph -->
    <radialGradient id="centralAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff2c6" stop-opacity="0.38"/>
      <stop offset="40%" stop-color="#f4d16e" stop-opacity="0.2"/>
      <stop offset="75%" stop-color="#6b4a1f" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#331953" stop-opacity="0"/>
    </radialGradient>

    <!-- 9. Kaus Australis glow (ε Sagittarii — brightest) -->
    <radialGradient id="kausGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff2c6" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ffe8a3" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#d4a574" stop-opacity="0"/>
    </radialGradient>

    <!-- Path for the bottom-arc inscription -->
    <path id="inscriptionArc" d="M 76 256 A 180 180 0 0 0 436 256" fill="none"/>
  </defs>

  <!-- ============ BACKGROUND ============ -->
  <g id="background">
    <rect x="0" y="0" width="512" height="512" fill="url(#bgNight)"/>
    <rect x="0" y="0" width="512" height="512" fill="url(#jupiterWash)"/>
    <rect x="0" y="0" width="512" height="512" fill="url(#vignette)"/>
  </g>

  <!-- ============ STARFIELD — scattered background stars ============ -->
  <g id="starfield" fill="#fff2c6">
    <circle cx="72"  cy="88"  r="1.1" fill-opacity="0.75"/>
    <circle cx="132" cy="52"  r="0.9" fill-opacity="0.6"/>
    <circle cx="214" cy="108" r="1.3" fill-opacity="0.85"/>
    <circle cx="426" cy="74"  r="1"   fill-opacity="0.7"/>
    <circle cx="470" cy="172" r="1.4" fill-opacity="0.9"/>
    <circle cx="50"  cy="210" r="1.1" fill-opacity="0.75"/>
    <circle cx="94"  cy="398" r="1.2" fill-opacity="0.8"/>
    <circle cx="162" cy="450" r="0.9" fill-opacity="0.6"/>
    <circle cx="406" cy="436" r="1.3" fill-opacity="0.85"/>
    <circle cx="458" cy="372" r="1"   fill-opacity="0.7"/>
    <circle cx="344" cy="58"  r="0.8" fill-opacity="0.55"/>
    <circle cx="70"  cy="334" r="1"   fill-opacity="0.7"/>
  </g>

  <!-- ============ SACRED GEOMETRY ============ -->
  <g id="sacred-geometry" fill="none" stroke="url(#goldThin)" stroke-opacity="0.85">
    <!-- Three concentric circles -->
    <circle cx="256" cy="256" r="240" stroke-width="0.8"/>
    <circle cx="256" cy="256" r="220" stroke-width="0.6" stroke-opacity="0.55"/>
    <circle cx="256" cy="256" r="200" stroke-width="0.8"/>

    <!-- Inner dashed mandala reference ring -->
    <circle cx="256" cy="256" r="150" stroke-width="0.4" stroke-opacity="0.35" stroke-dasharray="2 4"/>

    <!-- 12 tick marks on outer ring (r=240 → r=248), every 30° -->
    <g stroke="#d4a574" stroke-width="1.2" stroke-opacity="0.85">
      <line x1="256" y1="16"  x2="256" y2="8"/>
      <line x1="376" y1="48"  x2="380" y2="40"/>
      <line x1="464" y1="136" x2="472" y2="132"/>
      <line x1="496" y1="256" x2="504" y2="256"/>
      <line x1="464" y1="376" x2="472" y2="380"/>
      <line x1="376" y1="464" x2="380" y2="472"/>
      <line x1="256" y1="496" x2="256" y2="504"/>
      <line x1="136" y1="464" x2="132" y2="472"/>
      <line x1="48"  y1="376" x2="40"  y2="380"/>
      <line x1="16"  y1="256" x2="8"   y2="256"/>
      <line x1="48"  y1="136" x2="40"  y2="132"/>
      <line x1="136" y1="48"  x2="132" y2="40"/>
    </g>

    <!-- 12 tick marks on inner ring (r=200 → r=192) -->
    <g stroke="#d4a574" stroke-width="1" stroke-opacity="0.7">
      <line x1="256" y1="56"  x2="256" y2="64"/>
      <line x1="356" y1="83"  x2="354" y2="90"/>
      <line x1="429" y1="156" x2="422" y2="158"/>
      <line x1="456" y1="256" x2="448" y2="256"/>
      <line x1="429" y1="356" x2="422" y2="354"/>
      <line x1="356" y1="429" x2="354" y2="422"/>
      <line x1="256" y1="456" x2="256" y2="448"/>
      <line x1="156" y1="429" x2="158" y2="422"/>
      <line x1="83"  y1="356" x2="90"  y2="354"/>
      <line x1="56"  y1="256" x2="64"  y2="256"/>
      <line x1="83"  y1="156" x2="90"  y2="158"/>
      <line x1="156" y1="83"  x2="158" y2="90"/>
    </g>

    <!-- Ornamental double-ring — a finer inner band between outer circles -->
    <circle cx="256" cy="256" r="230" fill="none" stroke="#d4a574" stroke-width="0.35" stroke-opacity="0.45"/>

    <!-- 4 cardinal-point 4-pointed stars (compass jewels) -->
    <g fill="#d4a574" fill-opacity="0.85" stroke="none">
      <!-- North -->
      <path d="M 256 22 L 259 36 L 273 39 L 259 42 L 256 56 L 253 42 L 239 39 L 253 36 Z"/>
      <!-- East -->
      <path d="M 490 256 L 476 259 L 473 273 L 470 259 L 456 256 L 470 253 L 473 239 L 476 253 Z"/>
      <!-- South -->
      <path d="M 256 490 L 259 476 L 273 473 L 259 470 L 256 456 L 253 470 L 239 473 L 253 476 Z"/>
      <!-- West -->
      <path d="M 22 256 L 36 259 L 39 273 L 42 259 L 56 256 L 42 253 L 39 239 L 36 253 Z"/>
    </g>

    <!-- Bottom-arc inscription: Sagittarius · Ignis Mutabilis · Jupiter · Kaus Australis -->
    <g font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#d4a574" letter-spacing="2" font-style="italic">
      <text>
        <textPath href="#inscriptionArc" startOffset="50%" text-anchor="middle">♐  SAGITTARIUS  ·  IGNIS  MUTABILIS  ·  JUPITER  ·  KAUS  AUSTRALIS</textPath>
      </text>
    </g>
  </g>

  <!-- ============ AURA BEHIND THE GLYPH ============ -->
  <g id="aura">
    <circle cx="256" cy="240" r="175" fill="url(#centralAura)"/>
  </g>

  <!-- ============ MAIN SAGITTARIUS GLYPH — the archer's arrow ============ -->
  <!--
    Geometry: diagonal arrow from lower-left (180, 320) to upper-right (340, 180).
    Arrow direction vector is (160, -140), roughly 41° above horizontal.
    At the TIP (upper-right): two short barbs form the arrow-head.
    At the TAIL (lower-left): a short perpendicular cross-bar (bowstring notch).
  -->
  <g id="glyph" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main diagonal shaft — royal Jupiter gold, thick -->
    <line x1="180" y1="320" x2="340" y2="180"
          stroke="url(#royalGold)" stroke-width="14"/>

    <!-- Arrow tip barbs at upper-right end (340, 180).
         Barb 1: down-and-right from the tip (roughly perpendicular-ish).
         Barb 2: up-and-left-ish — giving the classic open arrowhead. -->
    <line x1="340" y1="180" x2="340" y2="214"
          stroke="url(#goldPrimary)" stroke-width="10"/>
    <line x1="340" y1="180" x2="306" y2="180"
          stroke="url(#goldPrimary)" stroke-width="10"/>

    <!-- Perpendicular cross-bar at lower-left end (180, 320).
         Perpendicular to shaft direction (160,-140) → normal roughly (140, 160) normalized.
         Length ~30, centered on (180, 320): endpoints (180 - 14, 320 - 16) and (180 + 14, 320 + 16) -->
    <line x1="166" y1="304" x2="194" y2="336"
          stroke="url(#goldPrimary)" stroke-width="12"/>

    <!-- Inner cream highlight pass — along shaft -->
    <line x1="181" y1="321" x2="339" y2="181"
          stroke="#fff2c6" stroke-width="1.5" stroke-opacity="0.55"/>
    <!-- Inner highlight on cross-bar -->
    <line x1="168" y1="306" x2="192" y2="334"
          stroke="#fff2c6" stroke-width="1.3" stroke-opacity="0.55"/>
    <!-- Inner highlight on barbs -->
    <line x1="340" y1="182" x2="340" y2="212"
          stroke="#fff2c6" stroke-width="1.3" stroke-opacity="0.55"/>
    <line x1="338" y1="180" x2="308" y2="180"
          stroke="#fff2c6" stroke-width="1.3" stroke-opacity="0.55"/>

    <!-- Ornamental sphere caps on cross-bar endpoints -->
    <circle cx="166" cy="304" r="2.5" fill="#fff2c6"/>
    <circle cx="194" cy="336" r="2.5" fill="#fff2c6"/>

    <!-- Ornamental jewel at arrow tip intersection -->
    <circle cx="340" cy="180" r="3.2" fill="url(#royalGold)"/>
    <circle cx="340" cy="180" r="1.4" fill="#fff2c6"/>
  </g>

  <!-- ============ CONSTELLATION — Sagittarius "Teapot" asterism ============ -->
  <!--
    Key stars of the Teapot:
    - Kaus Australis (ε, brightest) — SW bottom of teapot body
    - Kaus Media (δ) — W side
    - Kaus Borealis (λ) — NW top of the lid
    - Alnasl (γ) — the spout tip
    - Phi Sgr (φ) — top-NE of lid
    - Nunki (σ) — handle top
    - Tau Sgr (τ) — handle east
    - Ascella (ζ) — handle bottom
  -->
  <g id="constellation" opacity="0.95">
    <!-- Connecting lines — teapot outline -->
    <g stroke="url(#goldPrimary)" stroke-width="0.7" stroke-opacity="0.4" fill="none" stroke-linecap="round">
      <!-- Body: Kaus Australis → Kaus Media → Kaus Borealis -->
      <line x1="210" y1="352" x2="200" y2="296"/>
      <line x1="200" y1="296" x2="216" y2="244"/>
      <!-- Lid: Kaus Borealis → Phi Sgr -->
      <line x1="216" y1="244" x2="282" y2="236"/>
      <!-- Spout: Kaus Media → Alnasl -->
      <line x1="200" y1="296" x2="150" y2="280"/>
      <!-- Lid to handle: Phi Sgr → Nunki -->
      <line x1="282" y1="236" x2="340" y2="260"/>
      <!-- Handle: Nunki → Tau → Ascella -->
      <line x1="340" y1="260" x2="352" y2="306"/>
      <line x1="352" y1="306" x2="296" y2="340"/>
      <!-- Close handle to body: Ascella → Kaus Australis -->
      <line x1="296" y1="340" x2="210" y2="352"/>
      <!-- Close body: Kaus Australis → bottom of handle junction (implicit) -->
    </g>

    <!-- Stars -->
    <!-- Kaus Australis (ε) — brightest, r=3 with glow -->
    <circle cx="210" cy="352" r="6" fill="url(#kausGlow)"/>
    <circle cx="210" cy="352" r="3" fill="#fff2c6"/>
    <!-- Nunki (σ) — 2nd brightest handle top -->
    <circle cx="340" cy="260" r="2.4" fill="#fff2c6"/>
    <!-- Ascella (ζ) -->
    <circle cx="296" cy="340" r="2.2" fill="#ffe8a3"/>
    <!-- Kaus Media (δ) -->
    <circle cx="200" cy="296" r="2.2" fill="#ffe8a3"/>
    <!-- Kaus Borealis (λ) -->
    <circle cx="216" cy="244" r="2" fill="#fff2c6"/>
    <!-- Alnasl (γ) — spout tip -->
    <circle cx="150" cy="280" r="1.9" fill="#ffe8a3"/>
    <!-- Phi Sgr -->
    <circle cx="282" cy="236" r="1.7" fill="#fff2c6"/>
    <!-- Tau Sgr -->
    <circle cx="352" cy="306" r="1.6" fill="#ffe8a3"/>
  </g>

  <!-- ============ ORNAMENT — four Gothic filigree corner flourishes ============ -->
  <g id="ornament" fill="none" stroke="#d4a574" stroke-opacity="0.5" stroke-width="1.2" stroke-linecap="round">
    <!-- Top-left -->
    <g transform="translate(40,40)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
    <!-- Top-right -->
    <g transform="translate(442,40)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
    <!-- Bottom-left -->
    <g transform="translate(40,442)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
    <!-- Bottom-right -->
    <g transform="translate(442,442)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
  </g>
</svg>
