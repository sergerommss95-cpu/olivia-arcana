<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Aquarius zodiac glyph</title>
  <desc id="desc">Water bearer symbol — two parallel flowing wave zigzags, Uranus and Saturn co-ruled, fixed air sign, rendered as gold linework on deep navy in the mystic cartography style.</desc>

  <defs>
    <!-- 1. Deep night radial backdrop -->
    <radialGradient id="bgNight" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a0f2e"/>
      <stop offset="55%" stop-color="#0d0719"/>
      <stop offset="100%" stop-color="#05020e"/>
    </radialGradient>

    <!-- 2. Parchment vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>

    <!-- 3. Uranian electric-blue wash — subtle Uranus tint at the center -->
    <radialGradient id="uranianWash" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#2a5f9a" stop-opacity="0.14"/>
      <stop offset="60%" stop-color="#1a3d6b" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#1a3d6b" stop-opacity="0"/>
    </radialGradient>

    <!-- 4. Gold primary gradient (diagonal) -->
    <linearGradient id="goldPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe8a3"/>
      <stop offset="45%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#6b4a1f"/>
    </linearGradient>

    <!-- 5. Gold horizontal gradient (for flowing wave glyphs) -->
    <linearGradient id="goldPrimaryH" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#6b4a1f"/>
      <stop offset="20%" stop-color="#d4a574"/>
      <stop offset="50%" stop-color="#fff2c6"/>
      <stop offset="80%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#6b4a1f"/>
    </linearGradient>

    <!-- 6. Gold thin gradient — fine ring / tick marks -->
    <linearGradient id="goldThin" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6b4a1f"/>
      <stop offset="50%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#6b4a1f"/>
    </linearGradient>

    <!-- 7. Aura behind the central glyph -->
    <radialGradient id="centralAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff2c6" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#d4a574" stop-opacity="0.18"/>
      <stop offset="75%" stop-color="#6b4a1f" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#1a3d6b" stop-opacity="0"/>
    </radialGradient>

    <!-- 8. Sadalsuud star glow (beta Aquarii — the brightest) -->
    <radialGradient id="sadalsuudGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff2c6" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ffe8a3" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#d4a574" stop-opacity="0"/>
    </radialGradient>

    <!-- Path for the bottom-arc inscription -->
    <path id="inscriptionArc" d="M 76 256 A 180 180 0 0 0 436 256" fill="none"/>
  </defs>

  <!-- ============ BACKGROUND ============ -->
  <g id="background">
    <rect x="0" y="0" width="512" height="512" fill="url(#bgNight)"/>
    <rect x="0" y="0" width="512" height="512" fill="url(#uranianWash)"/>
    <rect x="0" y="0" width="512" height="512" fill="url(#vignette)"/>
  </g>

  <!-- ============ STARFIELD — 12 scattered background stars ============ -->
  <g id="starfield" fill="#fff2c6">
    <circle cx="72"  cy="88"  r="1.1" fill-opacity="0.75"/>
    <circle cx="132" cy="52"  r="0.9" fill-opacity="0.6"/>
    <circle cx="214" cy="98"  r="1.3" fill-opacity="0.85"/>
    <circle cx="428" cy="76"  r="1"   fill-opacity="0.7"/>
    <circle cx="466" cy="166" r="1.4" fill-opacity="0.9"/>
    <circle cx="50"  cy="204" r="1.1" fill-opacity="0.75"/>
    <circle cx="92"  cy="392" r="1.2" fill-opacity="0.8"/>
    <circle cx="160" cy="448" r="0.9" fill-opacity="0.6"/>
    <circle cx="404" cy="430" r="1.3" fill-opacity="0.85"/>
    <circle cx="458" cy="378" r="1"   fill-opacity="0.7"/>
    <circle cx="342" cy="58"  r="0.8" fill-opacity="0.55"/>
    <circle cx="74"  cy="332" r="1"   fill-opacity="0.7"/>
  </g>

  <!-- ============ SACRED GEOMETRY ============ -->
  <g id="sacred-geometry" fill="none" stroke="url(#goldThin)" stroke-opacity="0.85">
    <!-- Three concentric circles -->
    <circle cx="256" cy="256" r="240" stroke-width="0.8"/>
    <circle cx="256" cy="256" r="220" stroke-width="0.6" stroke-opacity="0.55"/>
    <circle cx="256" cy="256" r="200" stroke-width="0.8"/>

    <!-- Inner dashed mandala reference ring -->
    <circle cx="256" cy="256" r="150" stroke-width="0.4" stroke-opacity="0.35" stroke-dasharray="2 4"/>

    <!-- 12 tick marks on outer ring (r=240 -> r=248), every 30 deg -->
    <g stroke="#d4a574" stroke-width="1.2" stroke-opacity="0.85">
      <line x1="256" y1="16"  x2="256" y2="8"/>
      <line x1="376" y1="48"  x2="380" y2="40"/>
      <line x1="464" y1="136" x2="472" y2="132"/>
      <line x1="496" y1="256" x2="504" y2="256"/>
      <line x1="464" y1="376" x2="472" y2="380"/>
      <line x1="376" y1="464" x2="380" y2="472"/>
      <line x1="256" y1="496" x2="256" y2="504"/>
      <line x1="136" y1="464" x2="132" y2="472"/>
      <line x1="48"  y1="376" x2="40"  y2="380"/>
      <line x1="16"  y1="256" x2="8"   y2="256"/>
      <line x1="48"  y1="136" x2="40"  y2="132"/>
      <line x1="136" y1="48"  x2="132" y2="40"/>
    </g>

    <!-- 12 tick marks on inner ring (r=200 -> r=192) -->
    <g stroke="#d4a574" stroke-width="1" stroke-opacity="0.7">
      <line x1="256" y1="56"  x2="256" y2="64"/>
      <line x1="356" y1="83"  x2="354" y2="90"/>
      <line x1="429" y1="156" x2="422" y2="158"/>
      <line x1="456" y1="256" x2="448" y2="256"/>
      <line x1="429" y1="356" x2="422" y2="354"/>
      <line x1="356" y1="429" x2="354" y2="422"/>
      <line x1="256" y1="456" x2="256" y2="448"/>
      <line x1="156" y1="429" x2="158" y2="422"/>
      <line x1="83"  y1="356" x2="90"  y2="354"/>
      <line x1="56"  y1="256" x2="64"  y2="256"/>
      <line x1="83"  y1="156" x2="90"  y2="158"/>
      <line x1="156" y1="83"  x2="158" y2="90"/>
    </g>

    <!-- Ornamental double-ring (thin inner companion at r=206) -->
    <circle cx="256" cy="256" r="206" fill="none" stroke="#d4a574" stroke-opacity="0.35" stroke-width="0.5"/>

    <!-- 4 cardinal 4-pointed stars (compass jewels) -->
    <g fill="#d4a574" fill-opacity="0.85" stroke="none">
      <!-- North -->
      <path d="M 256 22 L 259 36 L 273 39 L 259 42 L 256 56 L 253 42 L 239 39 L 253 36 Z"/>
      <!-- East -->
      <path d="M 490 256 L 476 259 L 473 273 L 470 259 L 456 256 L 470 253 L 473 239 L 476 253 Z"/>
      <!-- South -->
      <path d="M 256 490 L 259 476 L 273 473 L 259 470 L 256 456 L 253 470 L 239 473 L 253 476 Z"/>
      <!-- West -->
      <path d="M 22 256 L 36 259 L 39 273 L 42 259 L 56 256 L 42 253 L 39 239 L 36 253 Z"/>
    </g>

    <!-- Bottom-arc inscription: Aquarius · Aer Fixus · Uranus · Sadalsuud -->
    <g id="inscription" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#d4a574" letter-spacing="2" font-style="italic">
      <text>
        <textPath href="#inscriptionArc" startOffset="50%" text-anchor="middle">♒  AQUARIUS  ·  AER  FIXUS  ·  URANUS  ·  SADALSUUD</textPath>
      </text>
    </g>
  </g>

  <!-- ============ AURA BEHIND THE GLYPH ============ -->
  <g id="aura">
    <circle cx="256" cy="200" r="170" fill="url(#centralAura)"/>
  </g>

  <!-- ============ MAIN AQUARIUS GLYPH — two parallel zigzag waves ============ -->
  <g id="glyph" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- UPPER wave — zigzag pattern: peaks up at x=166,256,346; valleys down at x=211,301 -->
    <!-- Spans x=166..346 (180px wide), centered at y=170 with amplitude ~22 -->
    <path d="M 166 160 L 211 192 L 256 160 L 301 192 L 346 160"
          stroke="url(#goldPrimaryH)" stroke-width="14"/>
    <!-- Upper wave cream inner highlight -->
    <path d="M 166 160 L 211 192 L 256 160 L 301 192 L 346 160"
          stroke="#fff2c6" stroke-width="1.5" stroke-opacity="0.55"/>

    <!-- LOWER wave — identical zigzag, 50px below (y-center 220) -->
    <path d="M 166 210 L 211 242 L 256 210 L 301 242 L 346 210"
          stroke="url(#goldPrimaryH)" stroke-width="14"/>
    <!-- Lower wave cream inner highlight -->
    <path d="M 166 210 L 211 242 L 256 210 L 301 242 L 346 210"
          stroke="#fff2c6" stroke-width="1.5" stroke-opacity="0.55"/>

    <!-- Ornamental sphere caps at endpoints -->
    <!-- Upper wave endpoints -->
    <circle cx="166" cy="160" r="2.5" fill="#fff2c6"/>
    <circle cx="346" cy="160" r="2.5" fill="#fff2c6"/>
    <!-- Lower wave endpoints -->
    <circle cx="166" cy="210" r="2.5" fill="#fff2c6"/>
    <circle cx="346" cy="210" r="2.5" fill="#fff2c6"/>
  </g>

  <!-- ============ CONSTELLATION — Aquarius key stars (Sadalmelik α, Sadalsuud β, Sadachbia γ, Skat δ) ============ -->
  <g id="constellation">
    <!-- Connecting lines — thin gold, opacity 0.4 -->
    <g stroke="url(#goldPrimary)" stroke-width="0.7" stroke-opacity="0.4" fill="none" stroke-linecap="round">
      <!-- Sadalsuud (β, bottom-left, brightest) to Sadalmelik (α, top) -->
      <line x1="148" y1="348" x2="232" y2="296"/>
      <!-- Sadalmelik (α) to Sadachbia (γ) -->
      <line x1="232" y1="296" x2="318" y2="328"/>
      <!-- Sadachbia (γ) to Skat (δ, lower-right) -->
      <line x1="318" y1="328" x2="380" y2="404"/>
      <!-- Sadalsuud down to Skat (closing faint line) -->
      <line x1="148" y1="348" x2="380" y2="404"/>
    </g>

    <!-- Stars (sized by magnitude) -->
    <!-- Sadalsuud (β Aquarii) — brightest, r=3 plus glow -->
    <circle cx="148" cy="348" r="7" fill="url(#sadalsuudGlow)"/>
    <circle cx="148" cy="348" r="3" fill="#fff2c6"/>
    <!-- Sadalmelik (α Aquarii) -->
    <circle cx="232" cy="296" r="2.4" fill="#fff2c6"/>
    <!-- Sadachbia (γ Aquarii) -->
    <circle cx="318" cy="328" r="2.2" fill="#ffe8a3"/>
    <!-- Skat (δ Aquarii) -->
    <circle cx="380" cy="404" r="2.2" fill="#fff2c6"/>
    <!-- Faint companion star for density -->
    <circle cx="282" cy="362" r="1.2" fill="#fff2c6" fill-opacity="0.8"/>
  </g>

  <!-- ============ ORNAMENT — four Gothic filigree corner flourishes ============ -->
  <g id="ornament" fill="none" stroke="#d4a574" stroke-opacity="0.5" stroke-width="1.2" stroke-linecap="round">
    <!-- Top-left -->
    <g transform="translate(40,40)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
    <!-- Top-right -->
    <g transform="translate(442,40)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
    <!-- Bottom-left -->
    <g transform="translate(40,442)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
    <!-- Bottom-right -->
    <g transform="translate(442,442)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
  </g>
</svg>
