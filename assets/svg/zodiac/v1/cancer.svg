<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Cancer zodiac glyph</title>
  <desc id="desc">Crab symbol, Moon ruled, cardinal water sign</desc>

  <defs>
    <!-- 1. Deep night radial backdrop -->
    <radialGradient id="bgNight" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a0f2e"/>
      <stop offset="55%" stop-color="#0d0719"/>
      <stop offset="100%" stop-color="#05020e"/>
    </radialGradient>

    <!-- 2. Parchment vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>

    <!-- 3. Lunar silver wash — Cancer is Moon-ruled, a subtle cool tint over the center -->
    <radialGradient id="lunarWash" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#2a3a5e" stop-opacity="0.14"/>
      <stop offset="60%" stop-color="#1a2448" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#1a2448" stop-opacity="0"/>
    </radialGradient>

    <!-- 4. Gold primary gradient (glyph + linework, diagonal) -->
    <linearGradient id="goldPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe8a3"/>
      <stop offset="45%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#6b4a1f"/>
    </linearGradient>

    <!-- 5. Gold vertical gradient (for the mirrored spirals) -->
    <linearGradient id="goldPrimaryV" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fff2c6"/>
      <stop offset="50%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#6b4a1f"/>
    </linearGradient>

    <!-- 6. Gold thin gradient — fine ring / tick marks -->
    <linearGradient id="goldThin" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6b4a1f"/>
      <stop offset="50%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#6b4a1f"/>
    </linearGradient>

    <!-- 7. Aura behind the central glyph -->
    <radialGradient id="centralAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff2c6" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#d4a574" stop-opacity="0.18"/>
      <stop offset="75%" stop-color="#6b4a1f" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#1a2448" stop-opacity="0"/>
    </radialGradient>

    <!-- 8. Acubens star glow (alpha Cancri) -->
    <radialGradient id="acubensGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff2c6" stop-opacity="1"/>
      <stop offset="40%" stop-color="#ffe8a3" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#d4a574" stop-opacity="0"/>
    </radialGradient>

    <!-- Path for the bottom-arc inscription -->
    <path id="inscriptionArc" d="M 76 256 A 180 180 0 0 0 436 256" fill="none"/>
  </defs>

  <!-- ============ BACKGROUND ============ -->
  <g id="background">
    <rect x="0" y="0" width="512" height="512" fill="url(#bgNight)"/>
    <rect x="0" y="0" width="512" height="512" fill="url(#lunarWash)"/>
    <rect x="0" y="0" width="512" height="512" fill="url(#vignette)"/>
  </g>

  <!-- ============ STARFIELD — scattered background stars ============ -->
  <g id="starfield" fill="#fff2c6">
    <circle cx="68"  cy="92"  r="1.1" fill-opacity="0.75"/>
    <circle cx="128" cy="54"  r="0.9" fill-opacity="0.6"/>
    <circle cx="210" cy="104" r="1.3" fill-opacity="0.85"/>
    <circle cx="430" cy="78"  r="1"   fill-opacity="0.7"/>
    <circle cx="468" cy="168" r="1.4" fill-opacity="0.9"/>
    <circle cx="52"  cy="206" r="1.1" fill-opacity="0.75"/>
    <circle cx="96"  cy="394" r="1.2" fill-opacity="0.8"/>
    <circle cx="158" cy="446" r="0.9" fill-opacity="0.6"/>
    <circle cx="402" cy="432" r="1.3" fill-opacity="0.85"/>
    <circle cx="456" cy="376" r="1"   fill-opacity="0.7"/>
    <circle cx="340" cy="60"  r="0.8" fill-opacity="0.55"/>
    <circle cx="72"  cy="330" r="1"   fill-opacity="0.7"/>
  </g>

  <!-- ============ SACRED GEOMETRY ============ -->
  <g id="sacred-geometry" fill="none" stroke="url(#goldThin)" stroke-opacity="0.85">
    <!-- Three concentric circles -->
    <circle cx="256" cy="256" r="240" stroke-width="0.8"/>
    <circle cx="256" cy="256" r="220" stroke-width="0.6" stroke-opacity="0.55"/>
    <circle cx="256" cy="256" r="200" stroke-width="0.8"/>

    <!-- Inner dashed mandala reference ring -->
    <circle cx="256" cy="256" r="150" stroke-width="0.4" stroke-opacity="0.35" stroke-dasharray="2 4"/>

    <!-- 12 tick marks on outer ring (r=240 → r=248), every 30° -->
    <g stroke="#d4a574" stroke-width="1.2" stroke-opacity="0.85">
      <line x1="256" y1="16"  x2="256" y2="8"/>
      <line x1="376" y1="48"  x2="380" y2="40"/>
      <line x1="464" y1="136" x2="472" y2="132"/>
      <line x1="496" y1="256" x2="504" y2="256"/>
      <line x1="464" y1="376" x2="472" y2="380"/>
      <line x1="376" y1="464" x2="380" y2="472"/>
      <line x1="256" y1="496" x2="256" y2="504"/>
      <line x1="136" y1="464" x2="132" y2="472"/>
      <line x1="48"  y1="376" x2="40"  y2="380"/>
      <line x1="16"  y1="256" x2="8"   y2="256"/>
      <line x1="48"  y1="136" x2="40"  y2="132"/>
      <line x1="136" y1="48"  x2="132" y2="40"/>
    </g>

    <!-- 12 tick marks on inner ring (r=200 → r=192) -->
    <g stroke="#d4a574" stroke-width="1" stroke-opacity="0.7">
      <line x1="256" y1="56"  x2="256" y2="64"/>
      <line x1="356" y1="83"  x2="354" y2="90"/>
      <line x1="429" y1="156" x2="422" y2="158"/>
      <line x1="456" y1="256" x2="448" y2="256"/>
      <line x1="429" y1="356" x2="422" y2="354"/>
      <line x1="356" y1="429" x2="354" y2="422"/>
      <line x1="256" y1="456" x2="256" y2="448"/>
      <line x1="156" y1="429" x2="158" y2="422"/>
      <line x1="83"  y1="356" x2="90"  y2="354"/>
      <line x1="56"  y1="256" x2="64"  y2="256"/>
      <line x1="83"  y1="156" x2="90"  y2="158"/>
      <line x1="156" y1="83"  x2="158" y2="90"/>
    </g>

    <!-- 4 cardinal-point 4-pointed stars (compass jewels) -->
    <g fill="#d4a574" fill-opacity="0.85" stroke="none">
      <!-- North -->
      <path d="M 256 22 L 259 36 L 273 39 L 259 42 L 256 56 L 253 42 L 239 39 L 253 36 Z"/>
      <!-- East -->
      <path d="M 490 256 L 476 259 L 473 273 L 470 259 L 456 256 L 470 253 L 473 239 L 476 253 Z"/>
      <!-- South -->
      <path d="M 256 490 L 259 476 L 273 473 L 259 470 L 256 456 L 253 470 L 239 473 L 253 476 Z"/>
      <!-- West -->
      <path d="M 22 256 L 36 259 L 39 273 L 42 259 L 56 256 L 42 253 L 39 239 L 36 253 Z"/>
    </g>

    <!-- Bottom-arc inscription: Cancer · Aqua Cardinalis -->
    <g font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#d4a574" letter-spacing="2" font-style="italic">
      <text>
        <textPath href="#inscriptionArc" startOffset="50%" text-anchor="middle">♋  CANCER  ·  AQUA  CARDINALIS  ·  LUNA  ·  ACUBENS</textPath>
      </text>
    </g>
  </g>

  <!-- ============ AURA BEHIND THE GLYPH ============ -->
  <g id="aura">
    <circle cx="256" cy="200" r="170" fill="url(#centralAura)"/>
  </g>

  <!-- ============ MAIN CANCER GLYPH — the "69" twin spirals ============ -->
  <g id="glyph" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- UPPER spiral (the "6" component) — tail sweeps from left-center, curls clockwise into a tight spiral in the upper-right -->
    <!-- Main sweeping tail -->
    <path d="M 120 175 C 150 138, 210 118, 280 125 C 340 131, 376 160, 376 195"
          stroke="url(#goldPrimaryV)" stroke-width="14"/>
    <!-- Spiral head curling inward (upper-right) -->
    <path d="M 376 195 C 376 224, 352 242, 324 238 C 300 234, 290 214, 302 198 C 312 186, 330 186, 336 200"
          stroke="url(#goldPrimaryV)" stroke-width="14"/>
    <!-- Cream inner highlight for the upper spiral -->
    <path d="M 122 177 C 152 140, 212 120, 280 127 C 340 133, 374 160, 374 195 C 374 222, 352 240, 324 236 C 300 232, 292 214, 304 199 C 314 188, 330 188, 336 200"
          stroke="#fff2c6" stroke-width="1.5" stroke-opacity="0.55"/>
    <!-- Decorative pearl in the upper spiral's eye -->
    <circle cx="322" cy="212" r="4" fill="#fff2c6"/>
    <circle cx="322" cy="212" r="6" fill="none" stroke="url(#goldPrimary)" stroke-width="1.2" stroke-opacity="0.7"/>

    <!-- LOWER spiral (the "9" component) — 180° rotational mirror of the upper, in the lower-left -->
    <!-- Main sweeping tail -->
    <path d="M 392 265 C 362 302, 302 322, 232 315 C 172 309, 136 280, 136 245"
          stroke="url(#goldPrimaryV)" stroke-width="14"/>
    <!-- Spiral head curling inward (lower-left) -->
    <path d="M 136 245 C 136 216, 160 198, 188 202 C 212 206, 222 226, 210 242 C 200 254, 182 254, 176 240"
          stroke="url(#goldPrimaryV)" stroke-width="14"/>
    <!-- Cream inner highlight for the lower spiral -->
    <path d="M 390 263 C 360 300, 300 320, 232 313 C 172 307, 138 280, 138 245 C 138 218, 160 200, 188 204 C 212 208, 220 226, 208 241 C 198 252, 182 252, 176 240"
          stroke="#fff2c6" stroke-width="1.5" stroke-opacity="0.55"/>
    <!-- Decorative pearl in the lower spiral's eye -->
    <circle cx="190" cy="228" r="4" fill="#fff2c6"/>
    <circle cx="190" cy="228" r="6" fill="none" stroke="url(#goldPrimary)" stroke-width="1.2" stroke-opacity="0.7"/>
  </g>

  <!-- ============ CONSTELLATION — Cancer (Praesepe / the Beehive, with Acubens, Altarf, Asellus Borealis & Australis) ============ -->
  <g id="constellation" opacity="0.4">
    <!-- Connecting lines — the faint upside-down Y of Cancer -->
    <g stroke="url(#goldPrimary)" stroke-width="0.7" fill="none" stroke-linecap="round">
      <!-- Altarf (β) at bottom, rises to central junction -->
      <line x1="256" y1="388" x2="256" y2="280"/>
      <!-- Central junction branches to Asellus Australis (δ) and Asellus Borealis (γ) -->
      <line x1="256" y1="280" x2="210" y2="220"/>
      <line x1="256" y1="280" x2="306" y2="226"/>
      <!-- Asellus Borealis out to Iota Cancri -->
      <line x1="306" y1="226" x2="348" y2="154"/>
      <!-- Asellus Australis out to Acubens (α) -->
      <line x1="210" y1="220" x2="164" y2="300"/>
    </g>

    <!-- Stars (sized by magnitude) -->
    <!-- Acubens (α Cancri) — the "claw" star, our brightest anchor -->
    <circle cx="164" cy="300" r="6" fill="url(#acubensGlow)"/>
    <circle cx="164" cy="300" r="3" fill="#fff2c6"/>
    <!-- Altarf (β Cancri) — the tail/foot -->
    <circle cx="256" cy="388" r="2.6" fill="#fff2c6"/>
    <!-- Asellus Borealis (γ Cancri) -->
    <circle cx="306" cy="226" r="2.2" fill="#ffe8a3"/>
    <!-- Asellus Australis (δ Cancri) — near the Beehive -->
    <circle cx="210" cy="220" r="2.2" fill="#ffe8a3"/>
    <!-- Iota Cancri (ι) -->
    <circle cx="348" cy="154" r="1.8" fill="#fff2c6"/>
    <!-- Central Y-junction marker (faint) -->
    <circle cx="256" cy="280" r="1.3" fill="#fff2c6" fill-opacity="0.85"/>
    <!-- Praesepe (M44 / Beehive cluster) — tiny speckle near the donkey stars -->
    <g fill="#fff2c6">
      <circle cx="256" cy="250" r="0.9"/>
      <circle cx="260" cy="246" r="0.8"/>
      <circle cx="252" cy="248" r="0.7"/>
      <circle cx="258" cy="254" r="0.7"/>
      <circle cx="254" cy="244" r="0.6"/>
    </g>
  </g>

  <!-- ============ ORNAMENT — four Gothic filigree corner flourishes ============ -->
  <g id="ornament" fill="none" stroke="#d4a574" stroke-opacity="0.5" stroke-width="1.2" stroke-linecap="round">
    <!-- Top-left -->
    <g transform="translate(40,40)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
    <!-- Top-right -->
    <g transform="translate(442,40)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
    <!-- Bottom-left -->
    <g transform="translate(40,442)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
    <!-- Bottom-right -->
    <g transform="translate(442,442)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
  </g>
</svg>
