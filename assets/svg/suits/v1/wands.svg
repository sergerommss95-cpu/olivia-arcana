<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Wands suit glyph</title>
  <desc id="desc">Budding wand, fire element, Minor Arcana suit of Wands — will, creation, ignition</desc>

  <defs>
    <!-- 1. Deep night radial backdrop -->
    <radialGradient id="bgNight" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a0f2e"/>
      <stop offset="55%" stop-color="#0d0719"/>
      <stop offset="100%" stop-color="#05020e"/>
    </radialGradient>

    <!-- 2. Parchment vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>

    <!-- 3. Warm-amber fire wash — very subtle hint of the fire element -->
    <radialGradient id="emberWash" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#E8A54B" stop-opacity="0.14"/>
      <stop offset="60%" stop-color="#a8541f" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#a8541f" stop-opacity="0"/>
    </radialGradient>

    <!-- 4. Gold primary gradient (glyph + linework, diagonal) -->
    <linearGradient id="goldPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe8a3"/>
      <stop offset="45%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#6b4a1f"/>
    </linearGradient>

    <!-- 5. Gold vertical gradient (for the staff) -->
    <linearGradient id="goldPrimaryV" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fff2c6"/>
      <stop offset="50%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#6b4a1f"/>
    </linearGradient>

    <!-- 6. Gold thin gradient — fine ring / tick marks -->
    <linearGradient id="goldThin" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6b4a1f"/>
      <stop offset="50%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#6b4a1f"/>
    </linearGradient>

    <!-- 7. Aura behind the central glyph -->
    <radialGradient id="centralAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff2c6" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#d4a574" stop-opacity="0.18"/>
      <stop offset="75%" stop-color="#6b4a1f" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#1a2448" stop-opacity="0"/>
    </radialGradient>

    <!-- 8. Leaf gradient — warm gold with a touch of green-gold sheen -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff2c6"/>
      <stop offset="55%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#6b4a1f"/>
    </linearGradient>

    <!-- Path for the bottom-arc inscription -->
    <path id="inscriptionArc" d="M 76 256 A 180 180 0 0 0 436 256" fill="none"/>
  </defs>

  <!-- ============ BACKGROUND ============ -->
  <g id="background">
    <rect x="0" y="0" width="512" height="512" fill="url(#bgNight)"/>
    <rect x="0" y="0" width="512" height="512" fill="url(#emberWash)"/>
    <rect x="0" y="0" width="512" height="512" fill="url(#vignette)"/>
  </g>

  <!-- ============ STARFIELD — scattered background stars ============ -->
  <g id="starfield" fill="#fff2c6">
    <circle cx="72"  cy="86"  r="1.1" fill-opacity="0.75"/>
    <circle cx="134" cy="58"  r="0.9" fill-opacity="0.6"/>
    <circle cx="218" cy="110" r="1.3" fill-opacity="0.85"/>
    <circle cx="428" cy="74"  r="1"   fill-opacity="0.7"/>
    <circle cx="462" cy="170" r="1.4" fill-opacity="0.9"/>
    <circle cx="48"  cy="210" r="1.1" fill-opacity="0.75"/>
    <circle cx="90"  cy="398" r="1.2" fill-opacity="0.8"/>
    <circle cx="162" cy="448" r="0.9" fill-opacity="0.6"/>
    <circle cx="406" cy="430" r="1.3" fill-opacity="0.85"/>
    <circle cx="458" cy="372" r="1"   fill-opacity="0.7"/>
    <circle cx="344" cy="66"  r="0.8" fill-opacity="0.55"/>
    <circle cx="74"  cy="326" r="1"   fill-opacity="0.7"/>
  </g>

  <!-- ============ SACRED GEOMETRY ============ -->
  <g id="sacred-geometry" fill="none" stroke="url(#goldThin)" stroke-opacity="0.85">
    <!-- Three concentric circles -->
    <circle cx="256" cy="256" r="240" stroke-width="0.8"/>
    <circle cx="256" cy="256" r="220" stroke-width="0.6" stroke-opacity="0.55"/>
    <circle cx="256" cy="256" r="200" stroke-width="0.8"/>

    <!-- Inner dashed mandala reference ring -->
    <circle cx="256" cy="256" r="150" stroke-width="0.4" stroke-opacity="0.35" stroke-dasharray="2 4"/>

    <!-- Ornamental double-ring -->
    <circle cx="256" cy="256" r="176" stroke-width="0.5" stroke-opacity="0.5"/>
    <circle cx="256" cy="256" r="172" stroke-width="0.3" stroke-opacity="0.35"/>

    <!-- 12 tick marks on outer ring (r=240 → r=248), every 30° -->
    <g stroke="#d4a574" stroke-width="1.2" stroke-opacity="0.85">
      <line x1="256" y1="16"  x2="256" y2="8"/>
      <line x1="376" y1="48"  x2="380" y2="40"/>
      <line x1="464" y1="136" x2="472" y2="132"/>
      <line x1="496" y1="256" x2="504" y2="256"/>
      <line x1="464" y1="376" x2="472" y2="380"/>
      <line x1="376" y1="464" x2="380" y2="472"/>
      <line x1="256" y1="496" x2="256" y2="504"/>
      <line x1="136" y1="464" x2="132" y2="472"/>
      <line x1="48"  y1="376" x2="40"  y2="380"/>
      <line x1="16"  y1="256" x2="8"   y2="256"/>
      <line x1="48"  y1="136" x2="40"  y2="132"/>
      <line x1="136" y1="48"  x2="132" y2="40"/>
    </g>

    <!-- 12 tick marks on inner ring (r=200 → r=192) -->
    <g stroke="#d4a574" stroke-width="1" stroke-opacity="0.7">
      <line x1="256" y1="56"  x2="256" y2="64"/>
      <line x1="356" y1="83"  x2="354" y2="90"/>
      <line x1="429" y1="156" x2="422" y2="158"/>
      <line x1="456" y1="256" x2="448" y2="256"/>
      <line x1="429" y1="356" x2="422" y2="354"/>
      <line x1="356" y1="429" x2="354" y2="422"/>
      <line x1="256" y1="456" x2="256" y2="448"/>
      <line x1="156" y1="429" x2="158" y2="422"/>
      <line x1="83"  y1="356" x2="90"  y2="354"/>
      <line x1="56"  y1="256" x2="64"  y2="256"/>
      <line x1="83"  y1="156" x2="90"  y2="158"/>
      <line x1="156" y1="83"  x2="158" y2="90"/>
    </g>

    <!-- 4 cardinal-point 4-pointed stars (compass jewels) -->
    <g fill="#d4a574" fill-opacity="0.85" stroke="none">
      <!-- North -->
      <path d="M 256 22 L 259 36 L 273 39 L 259 42 L 256 56 L 253 42 L 239 39 L 253 36 Z"/>
      <!-- East -->
      <path d="M 490 256 L 476 259 L 473 273 L 470 259 L 456 256 L 470 253 L 473 239 L 476 253 Z"/>
      <!-- South -->
      <path d="M 256 490 L 259 476 L 273 473 L 259 470 L 256 456 L 253 470 L 239 473 L 253 476 Z"/>
      <!-- West -->
      <path d="M 22 256 L 36 259 L 39 273 L 42 259 L 56 256 L 42 253 L 39 239 L 36 253 Z"/>
    </g>

    <!-- Bottom-arc inscription: Wands · Ignis · Voluntas · Creatio -->
    <g font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#d4a574" letter-spacing="2" font-style="italic">
      <text>
        <textPath href="#inscriptionArc" startOffset="50%" text-anchor="middle">WANDS  ·  IGNIS  ·  VOLUNTAS  ·  CREATIO</textPath>
      </text>
    </g>
  </g>

  <!-- ============ AURA BEHIND THE GLYPH ============ -->
  <g id="aura">
    <circle cx="256" cy="256" r="170" fill="url(#centralAura)"/>
  </g>

  <!-- ============ FIRE-ELEMENT DECORATION — radiating spark emanations from wand tip ============ -->
  <g id="ornament-sparks" stroke="#ffe8a3" stroke-width="1.1" stroke-linecap="round" opacity="0.35" fill="none">
    <!-- 12 spark rays emanating from around the top of the wand (cx=256, cy=120) -->
    <line x1="256" y1="96"  x2="256" y2="72"/>
    <line x1="272" y1="100" x2="286" y2="82"/>
    <line x1="240" y1="100" x2="226" y2="82"/>
    <line x1="286" y1="114" x2="308" y2="104"/>
    <line x1="226" y1="114" x2="204" y2="104"/>
    <line x1="294" y1="130" x2="318" y2="130"/>
    <line x1="218" y1="130" x2="194" y2="130"/>
    <line x1="286" y1="148" x2="304" y2="158"/>
    <line x1="226" y1="148" x2="208" y2="158"/>
    <line x1="270" y1="90"  x2="278" y2="64"/>
    <line x1="242" y1="90"  x2="234" y2="64"/>
    <line x1="256" y1="108" x2="256" y2="60"/>
    <!-- Three tiny spark-dots further out -->
    <circle cx="316" cy="88"  r="1.4" fill="#fff2c6" stroke="none"/>
    <circle cx="196" cy="88"  r="1.4" fill="#fff2c6" stroke="none"/>
    <circle cx="256" cy="52"  r="1.6" fill="#fff2c6" stroke="none"/>
  </g>

  <!-- ============ MAIN WANDS GLYPH — the budding staff ============ -->
  <g id="glyph" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- The vertical wooden staff — tapered, wider at top (x≈12 wide) narrowing toward base -->
    <!-- Main staff body, drawn as a stroked line with varying width via two tapered segments -->
    <path d="M 256 130 L 256 380"
          stroke="url(#goldPrimaryV)" stroke-width="14"/>

    <!-- Decorative wrapping bands around middle of staff — 3 thin gold stripes -->
    <g stroke="url(#goldPrimary)" stroke-linecap="round">
      <line x1="242" y1="236" x2="270" y2="236" stroke-width="2.4"/>
      <line x1="240" y1="250" x2="272" y2="250" stroke-width="3.2"/>
      <line x1="242" y1="264" x2="270" y2="264" stroke-width="2.4"/>
    </g>

    <!-- A small knurled ring at base (foot cap) -->
    <line x1="244" y1="374" x2="268" y2="374" stroke="url(#goldPrimary)" stroke-width="2.4" stroke-linecap="round"/>

    <!-- BUDDING LEAVES at the TOP of the wand (Ace of Wands budding rod) -->
    <!-- Leaf 1: center-left, pointing up-left -->
    <path d="M 256 130 Q 232 104, 224 74 Q 242 88, 254 118 Z"
          fill="url(#leafGrad)" stroke="url(#goldPrimary)" stroke-width="1.6"/>
    <!-- Leaf 2: center-top, pointing straight up -->
    <path d="M 256 128 Q 250 94, 256 60 Q 262 94, 258 128 Z"
          fill="url(#leafGrad)" stroke="url(#goldPrimary)" stroke-width="1.6"/>
    <!-- Leaf 3: center-right, pointing up-right -->
    <path d="M 256 130 Q 280 104, 288 74 Q 270 88, 258 118 Z"
          fill="url(#leafGrad)" stroke="url(#goldPrimary)" stroke-width="1.6"/>
    <!-- Leaf 4: small side leaf, lower-left budding -->
    <path d="M 254 136 Q 236 132, 222 122 Q 236 140, 252 142 Z"
          fill="url(#leafGrad)" stroke="url(#goldPrimary)" stroke-width="1.4"/>

    <!-- Leaf central veins (fine detail) -->
    <g stroke="#fff2c6" stroke-width="0.7" stroke-opacity="0.6" fill="none">
      <path d="M 256 128 Q 253 100, 254 72"/>
      <path d="M 252 120 Q 238 98, 227 80"/>
      <path d="M 260 120 Q 274 98, 285 80"/>
    </g>

    <!-- Inner highlight pass along the staff's left edge (directional light) -->
    <path d="M 252 134 L 252 378" stroke="#fff2c6" stroke-width="1.5" stroke-opacity="0.55" stroke-linecap="round"/>

    <!-- Staff knot/detail accents — two small circular wood-knots along the staff -->
    <circle cx="256" cy="190" r="3" fill="none" stroke="url(#goldPrimary)" stroke-width="1.1" stroke-opacity="0.75"/>
    <circle cx="256" cy="318" r="3" fill="none" stroke="url(#goldPrimary)" stroke-width="1.1" stroke-opacity="0.75"/>

    <!-- The "life spark" cream pearl at the very top of the wand (above the leaves) -->
    <circle cx="256" cy="56" r="3" fill="#fff2c6"/>
    <circle cx="256" cy="56" r="5.5" fill="none" stroke="url(#goldPrimary)" stroke-width="1" stroke-opacity="0.7"/>
  </g>

  <!-- ============ ORNAMENT — four Gothic filigree corner flourishes ============ -->
  <g id="ornament" fill="none" stroke="#d4a574" stroke-opacity="0.5" stroke-width="1.2" stroke-linecap="round">
    <!-- Top-left -->
    <g transform="translate(40,40)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
    <!-- Top-right -->
    <g transform="translate(442,40)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
    <!-- Bottom-left -->
    <g transform="translate(40,442)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
    <!-- Bottom-right -->
    <g transform="translate(442,442)">
      <path d="M 0 15 L 30 15 M 15 0 L 15 30"/>
      <path d="M 4 4 Q 15 10 26 4"/>
      <path d="M 4 26 Q 15 20 26 26"/>
      <circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/>
    </g>
  </g>
</svg>
