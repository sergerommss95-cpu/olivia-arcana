<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="480" height="480">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="72%">
      <stop offset="0%" stop-color="#2a1850"/>
      <stop offset="45%" stop-color="#1a0f2e"/>
      <stop offset="100%" stop-color="#07030f"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe8a3"/>
      <stop offset="45%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#6b4a1f"/>
    </linearGradient>
    <linearGradient id="goldInner" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#8a6d2f"/>
      <stop offset="60%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#fff2c6"/>
    </linearGradient>
    <radialGradient id="glyphGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#d4a574" stop-opacity="0.42"/>
      <stop offset="60%" stop-color="#d4a574" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#d4a574" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="200" height="200" fill="url(#bg)"/>

  <!-- Starfield -->
  <g fill="#ffe8a3">
    <circle cx="28" cy="34" r="0.6" opacity="0.75"/>
    <circle cx="172" cy="38" r="0.45" opacity="0.55"/>
    <circle cx="22" cy="152" r="0.55" opacity="0.6"/>
    <circle cx="176" cy="164" r="0.7" opacity="0.7"/>
    <circle cx="100" cy="18" r="0.4" opacity="0.5"/>
    <circle cx="100" cy="184" r="0.55" opacity="0.55"/>
    <circle cx="45" cy="80" r="0.3" opacity="0.4"/>
    <circle cx="160" cy="100" r="0.35" opacity="0.45"/>
    <circle cx="60" cy="170" r="0.3" opacity="0.4"/>
    <circle cx="140" cy="30" r="0.3" opacity="0.4"/>
  </g>

  <!-- Outer glyph aura -->
  <circle cx="100" cy="110" r="60" fill="url(#glyphGlow)"/>

  <!-- Ornamental double-ring -->
  <circle cx="100" cy="110" r="50" fill="none" stroke="url(#gold)" stroke-width="0.45" opacity="0.6"/>
  <circle cx="100" cy="110" r="55" fill="none" stroke="url(#goldInner)" stroke-width="0.25" opacity="0.35"/>

  <!-- 4 cardinal-point 4-pointed stars -->
  <g fill="#f4d16e" opacity="0.78">
    <path d="M100 57 L101.2 61 L105 62 L101.2 63 L100 67 L98.8 63 L95 62 L98.8 61 Z"/>
    <path d="M100 163 L101.2 159 L105 158 L101.2 157 L100 153 L98.8 157 L95 158 L98.8 159 Z"/>
    <path d="M47 110 L51 108.8 L52 105 L53 108.8 L57 110 L53 111.2 L52 115 L51 111.2 Z"/>
    <path d="M153 110 L149 108.8 L148 105 L147 108.8 L143 110 L147 111.2 L148 115 L149 111.2 Z"/>
  </g>

  <!-- Bull's head circle -->
  <circle cx="100" cy="120" r="15" fill="none" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="120" r="15" fill="none" stroke="#fff2c6" stroke-width="0.55" opacity="0.45"/>

  <!-- Left horn -->
  <path d="M 87.5 107 Q 73 100, 69 84 Q 67.5 76, 72 70"
        fill="none" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
  <path d="M 87.5 107 Q 73 100, 69 84 Q 67.5 76, 72 70"
        fill="none" stroke="#fff2c6" stroke-width="0.55" opacity="0.4"/>

  <!-- Right horn -->
  <path d="M 112.5 107 Q 127 100, 131 84 Q 132.5 76, 128 70"
        fill="none" stroke="url(#gold)" stroke-width="3" stroke-linecap="round"/>
  <path d="M 112.5 107 Q 127 100, 131 84 Q 132.5 76, 128 70"
        fill="none" stroke="#fff2c6" stroke-width="0.55" opacity="0.4"/>

  <!-- Horn tips -->
  <circle cx="72" cy="70" r="1.3" fill="#fff2c6"/>
  <circle cx="128" cy="70" r="1.3" fill="#fff2c6"/>
</svg>
