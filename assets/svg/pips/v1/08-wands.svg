<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Eight of Wands pip glyph</title>
  <desc id="desc">Eight of Wands — Velocitas. Eight mini-wands fly in parallel diagonal motion up-right across the central staff in swift flight.</desc>

  <defs>
    <radialGradient id="bgNight" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a0f2e"/>
      <stop offset="55%" stop-color="#0d0719"/>
      <stop offset="100%" stop-color="#05020e"/>
    </radialGradient>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="70%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="emberWash" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#E8A54B" stop-opacity="0.14"/>
      <stop offset="60%" stop-color="#a8541f" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#a8541f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe8a3"/>
      <stop offset="45%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#6b4a1f"/>
    </linearGradient>
    <linearGradient id="goldPrimaryV" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fff2c6"/>
      <stop offset="50%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#6b4a1f"/>
    </linearGradient>
    <linearGradient id="goldThin" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6b4a1f"/>
      <stop offset="50%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#6b4a1f"/>
    </linearGradient>
    <radialGradient id="centralAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff2c6" stop-opacity="0.32"/>
      <stop offset="40%" stop-color="#d4a574" stop-opacity="0.16"/>
      <stop offset="75%" stop-color="#6b4a1f" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#1a2448" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff2c6"/>
      <stop offset="55%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#6b4a1f"/>
    </linearGradient>
    <path id="inscriptionArc" d="M 76 256 A 180 180 0 0 0 436 256" fill="none"/>

    <symbol id="miniWand" overflow="visible">
      <line x1="0" y1="-20" x2="0" y2="20" stroke="url(#goldPrimaryV)" stroke-width="5" stroke-linecap="round"/>
      <ellipse cx="-3" cy="-22" rx="2.2" ry="3.4" fill="url(#leafGrad)"/>
      <ellipse cx="3"  cy="-22" rx="2.2" ry="3.4" fill="url(#leafGrad)"/>
      <circle cx="0" cy="-26" r="1.4" fill="#fff2c6"/>
    </symbol>
  </defs>

  <g id="background">
    <rect x="0" y="0" width="512" height="512" fill="url(#bgNight)"/>
    <rect x="0" y="0" width="512" height="512" fill="url(#emberWash)"/>
    <rect x="0" y="0" width="512" height="512" fill="url(#vignette)"/>
  </g>

  <g id="starfield" fill="#fff2c6">
    <circle cx="72"  cy="86"  r="1.1" fill-opacity="0.75"/>
    <circle cx="134" cy="58"  r="0.9" fill-opacity="0.6"/>
    <circle cx="218" cy="110" r="1.3" fill-opacity="0.85"/>
    <circle cx="428" cy="74"  r="1"   fill-opacity="0.7"/>
    <circle cx="462" cy="170" r="1.4" fill-opacity="0.9"/>
    <circle cx="48"  cy="210" r="1.1" fill-opacity="0.75"/>
    <circle cx="90"  cy="398" r="1.2" fill-opacity="0.8"/>
    <circle cx="162" cy="448" r="0.9" fill-opacity="0.6"/>
    <circle cx="406" cy="430" r="1.3" fill-opacity="0.85"/>
    <circle cx="458" cy="372" r="1"   fill-opacity="0.7"/>
    <circle cx="344" cy="66"  r="0.8" fill-opacity="0.55"/>
    <circle cx="74"  cy="326" r="1"   fill-opacity="0.7"/>
  </g>

  <g id="sacred-geometry" fill="none" stroke="url(#goldThin)" stroke-opacity="0.85">
    <circle cx="256" cy="256" r="240" stroke-width="0.8"/>
    <circle cx="256" cy="256" r="220" stroke-width="0.6" stroke-opacity="0.55"/>
    <circle cx="256" cy="256" r="200" stroke-width="0.8"/>
    <circle cx="256" cy="256" r="176" stroke-width="0.5" stroke-opacity="0.5"/>
    <circle cx="256" cy="256" r="172" stroke-width="0.3" stroke-opacity="0.35"/>
    <g fill="#d4a574" fill-opacity="0.85" stroke="none">
      <path d="M 256 22 L 259 36 L 273 39 L 259 42 L 256 56 L 253 42 L 239 39 L 253 36 Z"/>
      <path d="M 490 256 L 476 259 L 473 273 L 470 259 L 456 256 L 470 253 L 473 239 L 476 253 Z"/>
      <path d="M 256 490 L 259 476 L 273 473 L 259 470 L 256 456 L 253 470 L 239 473 L 253 476 Z"/>
      <path d="M 22 256 L 36 259 L 39 273 L 42 259 L 56 256 L 42 253 L 39 239 L 36 253 Z"/>
    </g>
    <g font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#d4a574" letter-spacing="2" font-style="italic">
      <text>
        <textPath href="#inscriptionArc" startOffset="50%" text-anchor="middle">VIII  WANDS  ·  IGNIS  ·  VELOCITAS</textPath>
      </text>
    </g>
  </g>

  <g font-family="Georgia, 'Times New Roman', serif" font-size="22" fill="#d4a574" font-style="italic" text-anchor="middle" letter-spacing="3">
    <text x="256" y="55">VIII</text>
  </g>

  <g id="aura"><circle cx="256" cy="256" r="150" fill="url(#centralAura)"/></g>

  <g id="central-wand" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 256 170 L 256 305" stroke="url(#goldPrimaryV)" stroke-width="10"/>
    <g stroke="url(#goldPrimary)" stroke-linecap="round">
      <line x1="246" y1="225" x2="266" y2="225" stroke-width="1.8"/>
      <line x1="244" y1="236" x2="268" y2="236" stroke-width="2.4"/>
      <line x1="246" y1="247" x2="266" y2="247" stroke-width="1.8"/>
    </g>
    <line x1="248" y1="302" x2="264" y2="302" stroke="url(#goldPrimary)" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M 256 170 Q 240 150, 234 128 Q 248 140, 254 162 Z" fill="url(#leafGrad)" stroke="url(#goldPrimary)" stroke-width="1.2"/>
    <path d="M 256 168 Q 252 142, 256 120 Q 260 142, 258 168 Z" fill="url(#leafGrad)" stroke="url(#goldPrimary)" stroke-width="1.2"/>
    <path d="M 256 170 Q 272 150, 278 128 Q 264 140, 258 162 Z" fill="url(#leafGrad)" stroke="url(#goldPrimary)" stroke-width="1.2"/>
    <circle cx="256" cy="116" r="2.2" fill="#fff2c6"/>
    <circle cx="256" cy="116" r="4" fill="none" stroke="url(#goldPrimary)" stroke-width="0.8" stroke-opacity="0.7"/>
    <path d="M 253 174 L 253 302" stroke="#fff2c6" stroke-width="1" stroke-opacity="0.5" stroke-linecap="round"/>
  </g>

  <!-- EIGHT WANDS: all 8 flying diagonally up-right in parallel, 30° from vertical -->
  <g id="pips">
    <use href="#miniWand" transform="translate(120,400) rotate(30)"/>
    <use href="#miniWand" transform="translate(160,390) rotate(30)"/>
    <use href="#miniWand" transform="translate(200,370) rotate(30)"/>
    <use href="#miniWand" transform="translate(240,345) rotate(30)"/>
    <use href="#miniWand" transform="translate(280,320) rotate(30)"/>
    <use href="#miniWand" transform="translate(320,295) rotate(30)"/>
    <use href="#miniWand" transform="translate(360,270) rotate(30)"/>
    <use href="#miniWand" transform="translate(400,245) rotate(30)"/>
    <!-- Subtle motion streaks behind each wand -->
    <g stroke="#ffe8a3" stroke-width="0.8" stroke-opacity="0.35" stroke-linecap="round" fill="none">
      <line x1="108" y1="410" x2="130" y2="398"/>
      <line x1="148" y1="400" x2="170" y2="388"/>
      <line x1="188" y1="380" x2="210" y2="368"/>
      <line x1="228" y1="355" x2="250" y2="343"/>
      <line x1="268" y1="330" x2="290" y2="318"/>
      <line x1="308" y1="305" x2="330" y2="293"/>
      <line x1="348" y1="280" x2="370" y2="268"/>
      <line x1="388" y1="255" x2="410" y2="243"/>
    </g>
  </g>

  <g id="ornament" fill="none" stroke="#d4a574" stroke-opacity="0.5" stroke-width="1.2" stroke-linecap="round">
    <g transform="translate(40,40)"><path d="M 0 15 L 30 15 M 15 0 L 15 30"/><path d="M 4 4 Q 15 10 26 4"/><path d="M 4 26 Q 15 20 26 26"/><circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/></g>
    <g transform="translate(442,40)"><path d="M 0 15 L 30 15 M 15 0 L 15 30"/><path d="M 4 4 Q 15 10 26 4"/><path d="M 4 26 Q 15 20 26 26"/><circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/></g>
    <g transform="translate(40,442)"><path d="M 0 15 L 30 15 M 15 0 L 15 30"/><path d="M 4 4 Q 15 10 26 4"/><path d="M 4 26 Q 15 20 26 26"/><circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/></g>
    <g transform="translate(442,442)"><path d="M 0 15 L 30 15 M 15 0 L 15 30"/><path d="M 4 4 Q 15 10 26 4"/><path d="M 4 26 Q 15 20 26 26"/><circle cx="15" cy="15" r="2.5" fill="#d4a574" fill-opacity="0.5" stroke="none"/></g>
  </g>
</svg>
